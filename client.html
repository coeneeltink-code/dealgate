<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealGate — Book a call</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; }
    body {
      background: #0A0B10;
      color: #fff;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      margin: 0;
      min-height: 100vh;
    }
    .grid-pattern {
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .gradient-border {
      position: relative;
      background: linear-gradient(#11141D, #11141D) padding-box,
                  linear-gradient(135deg, rgba(16,185,129,0.4), rgba(16,185,129,0.05) 40%, rgba(255,255,255,0.05)) border-box;
      border: 1px solid transparent;
    }
    .dg-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      resize: vertical;
    }
    .dg-input::placeholder { color: rgba(255,255,255,0.3); }
    .dg-input:focus {
      border-color: rgba(16,185,129,0.5);
      background: rgba(255,255,255,0.06);
    }
    .btn-primary {
      background: #10B981;
      color: #fff;
      font-weight: 800;
      font-size: 16px;
      border-radius: 10px;
      padding: 15px 28px;
      border: none;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s, transform 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .btn-primary:hover { background: #059669; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .dg-error { color: #10B981; font-size: 13px; font-weight: 600; margin-top: 8px; text-align: center; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-up { animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) forwards; opacity: 0; }
    @keyframes pulseRed {
      0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.5), 0 10px 40px -10px rgba(16,185,129,0.5); }
      50%       { box-shadow: 0 0 0 14px rgba(16,185,129,0), 0 10px 40px -10px rgba(16,185,129,0.3); }
    }
    .animate-pulse-red { animation: pulseRed 2.5s infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    .step-circle {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.3);
      color: #10B981;
      font-weight: 800;
      font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .lock-icon { font-size: 18px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    var SUPABASE_URL = 'https://pokgkdxuxwipoawviecs.supabase.co';
    var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBva2drZHh1eHdpcG9hd3ZpZWNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NTQyODQsImV4cCI6MjA5MjIzMDI4NH0.E-wkO-cUsG4yTKtjaCMiyNFOXEaoWnFvElod4-n9lwA';
    var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  </script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function ClientPage() {
      // Get username from URL path: /john → "john"
      const username = window.location.pathname.replace(/^\//, '').split('/')[0];

      const [freelancer, setFreelancer] = useState(null);
      const [loading, setLoading] = useState(true);
      const [notFound, setNotFound] = useState(false);

      // Form state
      const [clientName, setClientName] = useState('');
      const [clientEmail, setClientEmail] = useState('');
      const [answers, setAnswers] = useState([]);
      const [step, setStep] = useState('form'); // 'form' | 'submitted'
      const [submitting, setSubmitting] = useState(false);
      const [error, setError] = useState('');

      useEffect(() => {
        if (!username) { setNotFound(true); setLoading(false); return; }
        db.from('freelancers')
          .select('*')
          .eq('username', username)
          .maybeSingle()
          .then(({ data, error }) => {
            if (error || !data) { setNotFound(true); }
            else {
              setFreelancer(data);
              setAnswers(new Array(data.questions?.length || 0).fill(''));
            }
            setLoading(false);
          });
      }, []);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!clientName.trim() || !clientEmail.trim()) return;
        const allAnswered = answers.every(a => a.trim().length > 0);
        if (!allAnswered) { setError('Please answer all questions.'); return; }
        setError('');
        setSubmitting(true);

        // Save submission to Supabase
        const { error: saveError } = await db
          .from('submissions')
          .insert({
            freelancer_id: freelancer.id,
            client_name: clientName.trim(),
            client_email: clientEmail.trim(),
            answers: answers,
            status: 'pending_payment',
          });

        if (saveError && saveError.code !== '42P01') {
          // Table may not exist yet — still proceed to next step
          console.warn('Submissions table not ready:', saveError.message);
        }

        setSubmitting(false);
        setStep('submitted');
      };

      if (loading) return (
        <div className="flex items-center justify-center min-h-screen">
          <div style={{ color: 'rgba(255,255,255,0.3)', fontSize: 14 }}>Loading…</div>
        </div>
      );

      if (notFound) return (
        <div className="relative min-h-screen flex flex-col">
          <div className="absolute inset-0 grid-pattern" style={{ opacity: 0.3, maskImage: 'radial-gradient(ellipse at center, black 50%, transparent 85%)', WebkitMaskImage: 'radial-gradient(ellipse at center, black 50%, transparent 85%)' }} />
          <header className="relative z-10 px-6 py-5">
            <a href="/" className="flex items-center gap-2 no-underline w-fit">
              <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ background: '#10B981' }}>
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M3 3h10v10H3z" stroke="white" strokeWidth="1.8"/>
                  <path d="M7 6v4M9 6v4" stroke="white" strokeWidth="1.8" strokeLinecap="round"/>
                </svg>
              </div>
              <span className="text-white font-black text-xl tracking-tight">Deal<span style={{ color: '#10B981' }}>Gate</span></span>
            </a>
          </header>
          <main className="relative z-10 flex-1 flex items-center justify-center px-4 text-center">
            <div>
              <div className="text-6xl mb-6">🔍</div>
              <h1 className="text-3xl font-black mb-3">Page not found</h1>
              <p className="text-white/50 mb-8">This DealGate link doesn't exist or has been removed.</p>
              <a href="/" className="inline-block bg-white/5 border border-white/10 text-white font-bold px-6 py-3 rounded-xl hover:bg-white/10 transition-colors">← Back to DealGate</a>
            </div>
          </main>
        </div>
      );

      if (step === 'submitted') return (
        <div className="relative min-h-screen flex flex-col">
          <div className="absolute inset-0 grid-pattern" style={{ opacity: 0.25, maskImage: 'radial-gradient(ellipse at center, black 50%, transparent 85%)', WebkitMaskImage: 'radial-gradient(ellipse at center, black 50%, transparent 85%)' }} />
          <div className="absolute pointer-events-none" style={{ top: '20%', left: '50%', transform: 'translateX(-50%)', width: '500px', height: '300px', background: 'rgba(16,185,129,0.1)', filter: 'blur(120px)' }} />
          <header className="relative z-10 px-6 py-5">
            <a href="/" className="flex items-center gap-2 no-underline w-fit">
              <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ background: '#10B981' }}>
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M3 3h10v10H3z" stroke="white" strokeWidth="1.8"/>
                  <path d="M7 6v4M9 6v4" stroke="white" strokeWidth="1.8" strokeLinecap="round"/>
                </svg>
              </div>
              <span className="text-white font-black text-xl tracking-tight">Deal<span style={{ color: '#10B981' }}>Gate</span></span>
            </a>
          </header>
          <main className="relative z-10 flex-1 flex items-center justify-center px-4">
            <div className="w-full max-w-md text-center animate-fade-up">
              <div className="w-20 h-20 rounded-full mx-auto mb-8 flex items-center justify-center" style={{ background: 'rgba(16,185,129,0.1)', border: '1px solid rgba(16,185,129,0.3)', boxShadow: '0 0 60px -10px rgba(16,185,129,0.5)' }}>
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                  <path d="M8 18l7 7 13-13" stroke="#10B981" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </div>
              <h1 className="text-3xl font-black mb-3">You're in the queue.</h1>
              <p className="text-white/60 mb-6">
                Your intake has been received. <strong className="text-white">{freelancer.username}</strong> will review your answers and follow up with payment details.
              </p>
              <div className="gradient-border rounded-xl p-5 text-left mb-8">
                <p className="text-xs font-semibold text-white/40 uppercase tracking-widest mb-3">What happens next</p>
                <div className="space-y-3">
                  {[
                    'Your answers are reviewed',
                    `You'll receive a payment link for $${freelancer.price}`,
                    'After payment, you get access to a call',
                  ].map((item, i) => (
                    <div key={i} className="flex items-center gap-3 text-sm text-white/70">
                      <div className="step-circle">{i + 1}</div>
                      {item}
                    </div>
                  ))}
                </div>
              </div>
              <p className="text-white/30 text-xs">Check your inbox at <strong className="text-white/50">{clientEmail}</strong> for a confirmation.</p>
            </div>
          </main>
        </div>
      );

      return (
        <div className="relative min-h-screen flex flex-col">
          <div className="absolute inset-0 grid-pattern" style={{ opacity: 0.25, maskImage: 'radial-gradient(ellipse at center, black 50%, transparent 85%)', WebkitMaskImage: 'radial-gradient(ellipse at center, black 50%, transparent 85%)' }} />
          <div className="absolute pointer-events-none" style={{ top: '15%', left: '50%', transform: 'translateX(-50%)', width: '500px', height: '250px', background: 'rgba(16,185,129,0.08)', filter: 'blur(100px)' }} />

          {/* Header */}
          <header className="relative z-10 px-6 py-5">
            <a href="/" className="flex items-center gap-2 no-underline w-fit">
              <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ background: '#10B981' }}>
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M3 3h10v10H3z" stroke="white" strokeWidth="1.8"/>
                  <path d="M7 6v4M9 6v4" stroke="white" strokeWidth="1.8" strokeLinecap="round"/>
                </svg>
              </div>
              <span className="text-white font-black text-xl tracking-tight">Deal<span style={{ color: '#10B981' }}>Gate</span></span>
            </a>
          </header>

          <main className="relative z-10 flex-1 flex items-start justify-center px-4 py-8">
            <div className="w-full max-w-lg animate-fade-up">

              {/* Freelancer badge */}
              <div className="flex items-center gap-4 mb-8 p-5 rounded-2xl" style={{ background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.08)' }}>
                <div className="w-14 h-14 rounded-full flex items-center justify-center font-black text-xl text-white flex-shrink-0" style={{ background: '#10B981', boxShadow: '0 0 30px -5px rgba(16,185,129,0.6)' }}>
                  {freelancer.username[0].toUpperCase()}
                </div>
                <div>
                  <div className="text-white font-black text-lg">@{freelancer.username}</div>
                  <div className="text-white/50 text-sm">wants to know you're serious before booking a call</div>
                </div>
                <div className="ml-auto text-right flex-shrink-0">
                  <div className="text-white font-black text-2xl">${freelancer.price}</div>
                  <div className="text-white/40 text-xs">intake fee</div>
                </div>
              </div>

              {/* How it works */}
              <div className="flex items-center gap-4 justify-center mb-8 text-xs text-white/50 font-semibold uppercase tracking-wider">
                <span className="flex items-center gap-1.5"><span style={{ color: '#10B981' }}>1.</span> Answer questions</span>
                <span style={{ color: 'rgba(255,255,255,0.2)' }}>→</span>
                <span className="flex items-center gap-1.5"><span style={{ color: '#10B981' }}>2.</span> Pay ${freelancer.price}</span>
                <span style={{ color: 'rgba(255,255,255,0.2)' }}>→</span>
                <span className="flex items-center gap-1.5"><span style={{ color: '#10B981' }}>3.</span> Get access</span>
              </div>

              {/* Form */}
              <form onSubmit={handleSubmit} className="space-y-5">
                {/* Name + email */}
                <div className="gradient-border rounded-2xl p-6 space-y-4">
                  <p className="text-xs font-semibold text-white/40 uppercase tracking-widest">Your info</p>
                  <div>
                    <label className="text-xs font-semibold text-white/50 uppercase tracking-widest block mb-1.5">Your name</label>
                    <input
                      className="dg-input"
                      type="text"
                      placeholder="John Smith"
                      value={clientName}
                      onChange={e => setClientName(e.target.value)}
                      required
                      autoFocus
                    />
                  </div>
                  <div>
                    <label className="text-xs font-semibold text-white/50 uppercase tracking-widest block mb-1.5">Your email</label>
                    <input
                      className="dg-input"
                      type="email"
                      placeholder="you@company.com"
                      value={clientEmail}
                      onChange={e => setClientEmail(e.target.value)}
                      required
                    />
                  </div>
                </div>

                {/* Questions */}
                {freelancer.questions && freelancer.questions.length > 0 && (
                  <div className="gradient-border rounded-2xl p-6 space-y-5">
                    <p className="text-xs font-semibold text-white/40 uppercase tracking-widest">Answer these first</p>
                    {freelancer.questions.map((q, i) => (
                      <div key={i}>
                        <label className="text-sm font-semibold text-white block mb-2">
                          <span style={{ color: '#10B981', fontWeight: 800 }}>{i + 1}. </span>{q}
                        </label>
                        <textarea
                          className="dg-input"
                          rows={3}
                          placeholder="Your answer…"
                          value={answers[i] || ''}
                          onChange={e => {
                            const next = [...answers];
                            next[i] = e.target.value;
                            setAnswers(next);
                          }}
                          required
                        />
                      </div>
                    ))}
                  </div>
                )}

                {error && <p className="dg-error">{error}</p>}

                {/* Submit */}
                <button
                  type="submit"
                  className="btn-primary animate-pulse-red"
                  disabled={submitting || !clientName.trim() || !clientEmail.trim()}
                >
                  {submitting
                    ? <span className="flex items-center justify-center gap-2"><span className="spinner" /> Submitting…</span>
                    : `Submit & request access for $${freelancer.price} →`
                  }
                </button>

                {/* Trust signals */}
                <div className="flex items-center justify-center gap-6 text-xs text-white/30 pt-1">
                  <span className="flex items-center gap-1.5">🔒 Secure</span>
                  <span className="flex items-center gap-1.5">✓ No spam</span>
                  <span className="flex items-center gap-1.5">✓ Money-back if rejected</span>
                </div>
              </form>

              {/* Footer note */}
              <p className="text-center text-white/20 text-xs mt-8">
                Powered by <a href="/" style={{ color: 'rgba(16,185,129,0.6)' }}>DealGate</a> · <a href="/privacy.html" style={{ color: 'rgba(255,255,255,0.3)' }}>Privacy</a> · <a href="/terms.html" style={{ color: 'rgba(255,255,255,0.3)' }}>Terms</a>
              </p>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ClientPage />);
  </script>
</body>
</html>
