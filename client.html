<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book a consultation — DealGate</title>
  <meta name="description" content="Answer a few questions and secure your spot. Serious inquiries only." />
  <meta name="robots" content="noindex, nofollow" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: '#10B981',
            'accent-dark': '#059669',
            'accent-bright': '#34D399',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
            serif: ['Instrument Serif', 'serif'],
          },
        }
      }
    }
  </script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

    /* Glow */
    .glow-accent { box-shadow: 0 0 40px rgba(16,185,129,0.25), 0 0 80px rgba(16,185,129,0.1); }
    .glow-accent-sm { box-shadow: 0 0 20px rgba(16,185,129,0.2); }

    /* Progress bar */
    .progress-fill { transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }

    /* Input focus */
    .dg-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .dg-input:focus {
      outline: none;
      border-color: #10B981;
      box-shadow: 0 0 0 3px rgba(16,185,129,0.15);
    }
    .dg-input::placeholder { color: rgba(255,255,255,0.3); }

    /* Radio option cards */
    .option-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .option-card:hover { border-color: rgba(16,185,129,0.4); background: rgba(16,185,129,0.05); }
    .option-card.selected {
      border-color: #10B981;
      background: rgba(16,185,129,0.08);
    }
    .option-card.selected .option-dot { background: #10B981; border-color: #10B981; }
    .option-dot {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      flex-shrink: 0; transition: background 0.2s, border-color 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .option-dot::after { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #fff; opacity: 0; transition: opacity 0.2s; }
    .option-card.selected .option-dot::after { opacity: 1; }

    /* Checkout card */
    .checkout-card {
      background: rgba(16,185,129,0.06);
      border: 1px solid rgba(16,185,129,0.2);
    }

    /* Stripe badge */
    .stripe-badge {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* Fade-in animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.4s ease both; }

    /* Step transitions */
    .step-enter { animation: fadeUp 0.35s ease both; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    /* Focus ring — accessibility + premium feel */
    .focus-ring:focus { outline: none; }
    .focus-ring:focus-visible {
      outline: 2px solid rgba(16,185,129,0.7);
      outline-offset: 2px;
    }
    a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible {
      outline: 2px solid rgba(16,185,129,0.7);
      outline-offset: 2px;
    }
  </style>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2310B981'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Inter,sans-serif' font-weight='900' font-size='18' fill='white'>D</text></svg>" />
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ══════════════════════════════════════
   CONFIGURATION — freelancer fills this
   (in production this comes from the URL slug / DB)
   ══════════════════════════════════════ */
const FREELANCER = {
  name: 'Alex van der Berg',
  role: 'Brand Identity Designer',
  avatar: null, // URL or null for initials
  price: 49,    // intake fee in EUR
  currency: '€',
  paymentRationale: 'This covers the preparation time I invest before every first conversation.',
  refundPolicy: 'If we\'re not a fit, you get a full refund within 24 hours — no questions asked.',
  questions: [
    {
      id: 'project_type',
      label: 'What kind of project do you need help with?',
      type: 'radio',
      required: true,
      options: [
        'Brand identity / logo',
        'Website design',
        'Marketing materials',
        'Full brand strategy',
        'Something else',
      ],
    },
    {
      id: 'budget',
      label: 'What\'s your budget range for this project?',
      type: 'radio',
      required: true,
      options: [
        'Under €1,000',
        '€1,000 – €3,000',
        '€3,000 – €8,000',
        '€8,000+',
        'Not sure yet',
      ],
    },
    {
      id: 'timeline',
      label: 'When do you need this done?',
      type: 'radio',
      required: true,
      options: [
        'ASAP (within 2 weeks)',
        '1–2 months',
        '3–6 months',
        'No hard deadline',
      ],
    },
    {
      id: 'description',
      label: 'Briefly describe what you\'re trying to achieve.',
      type: 'textarea',
      required: true,
      placeholder: 'Tell me about your project, your goals, and any context that would help me understand your needs...',
    },
    {
      id: 'name',
      label: 'Your name',
      type: 'text',
      required: true,
      placeholder: 'First and last name',
    },
    {
      id: 'email',
      label: 'Your email address',
      type: 'email',
      required: true,
      placeholder: 'you@company.com',
    },
    {
      id: 'company',
      label: 'Company or website (optional)',
      type: 'text',
      required: false,
      placeholder: 'yourcompany.com',
    },
  ],
};

/* ══════════════════════════════════════
   HEADER — freelancer identity
   ══════════════════════════════════════ */
function FreelancerHeader() {
  const initials = FREELANCER.name.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();

  return (
    <header className="pb-8 text-center lg:text-left fade-up">
      {/* Avatar */}
      <div className="mx-auto lg:mx-0 mb-5 lg:mb-6 w-20 h-20 lg:w-24 lg:h-24 rounded-2xl flex items-center justify-center font-black text-2xl lg:text-3xl glow-accent-sm"
           style={{ background: 'linear-gradient(135deg, #059669, #10B981)', color: '#fff', letterSpacing: '-0.02em' }}>
        {FREELANCER.avatar
          ? <img src={FREELANCER.avatar} alt={FREELANCER.name} className="w-full h-full object-cover rounded-2xl" />
          : initials}
      </div>

      {/* Name + role */}
      <h1 className="text-2xl lg:text-3xl font-black text-white mb-1" style={{ letterSpacing: '-0.02em' }}>
        {FREELANCER.name}
      </h1>
      <p className="text-white/50 text-sm lg:text-base font-medium">{FREELANCER.role}</p>

      {/* DealGate watermark */}
      <div className="mt-6 flex items-center justify-center lg:justify-start gap-1.5">
        <div className="w-1 h-1 rounded-full bg-accent/60" />
        <p className="text-xs text-white/25 font-medium">Powered by <span className="text-white/40">DealGate</span></p>
        <div className="w-1 h-1 rounded-full bg-accent/60" />
      </div>
    </header>
  );
}

/* ══════════════════════════════════════
   PROGRESS BAR
   ══════════════════════════════════════ */
function ProgressBar({ current, total }) {
  const pct = Math.round((current / total) * 100);
  return (
    <div className="w-full h-0.5 bg-white/5 rounded-full overflow-hidden mb-10">
      <div className="progress-fill h-full rounded-full bg-accent" style={{ width: `${pct}%` }} />
    </div>
  );
}

/* ══════════════════════════════════════
   SINGLE QUESTION STEP
   ══════════════════════════════════════ */
function QuestionStep({ question, value, onChange, onNext, onBack, stepIndex, totalSteps }) {
  const canContinue = !question.required || (value !== '' && value !== undefined && value !== null);
  const inputRef = React.useRef(null);

  React.useEffect(() => {
    // Focus the input on mount without scrolling the page — avoids jump-to-top jank
    // when navigating between steps.
    if (inputRef.current) {
      inputRef.current.focus({ preventScroll: true });
      // Move cursor to end so back-nav doesn't highlight existing text.
      const v = inputRef.current.value;
      if (typeof inputRef.current.setSelectionRange === 'function' && v) {
        try { inputRef.current.setSelectionRange(v.length, v.length); } catch (e) {}
      }
    }
  }, [question.id]);

  function handleKey(e) {
    if (e.key === 'Enter' && question.type !== 'textarea' && canContinue) onNext();
  }

  return (
    <div className="step-enter" key={question.id}>
      {/* Step counter */}
      <p className="text-xs uppercase tracking-widest text-white/30 mb-4 font-mono">
        {stepIndex + 1} / {totalSteps}
      </p>

      {/* Question */}
      <h2 id={`q-${question.id}-label`} className="text-2xl sm:text-3xl font-black text-white mb-6 leading-tight" style={{ letterSpacing: '-0.02em' }}>
        {question.label}
        {!question.required && <span className="ml-2 text-base font-medium text-white/30">(optional)</span>}
      </h2>

      {/* Inputs */}
      {question.type === 'radio' && (
        <div role="radiogroup" aria-labelledby={`q-${question.id}-label`} className="flex flex-col gap-2.5">
          {question.options.map(opt => (
            <button
              key={opt}
              type="button"
              role="radio"
              aria-checked={value === opt}
              className={`option-card w-full text-left px-5 py-4 min-h-[56px] rounded-xl flex items-center gap-4 focus-ring ${value === opt ? 'selected' : ''}`}
              onClick={() => onChange(opt)}
            >
              <span className="option-dot" />
              <span className="text-white/85 font-medium text-[15px] leading-snug">{opt}</span>
            </button>
          ))}
        </div>
      )}

      {question.type === 'textarea' && (
        <textarea
          ref={inputRef}
          id={`q-${question.id}`}
          aria-labelledby={`q-${question.id}-label`}
          className="dg-input w-full rounded-xl px-5 py-4 text-sm font-medium resize-none leading-relaxed"
          rows={5}
          placeholder={question.placeholder}
          value={value || ''}
          onChange={e => onChange(e.target.value)}
        />
      )}

      {(question.type === 'text' || question.type === 'email') && (
        <input
          ref={inputRef}
          id={`q-${question.id}`}
          aria-labelledby={`q-${question.id}-label`}
          type={question.type}
          className="dg-input w-full rounded-xl px-5 py-4 text-sm font-medium min-h-[48px]"
          placeholder={question.placeholder}
          value={value || ''}
          onChange={e => onChange(e.target.value)}
          onKeyDown={handleKey}
          autoComplete={question.type === 'email' ? 'email' : 'name'}
        />
      )}

      {/* Nav */}
      <div className="flex items-center gap-3 mt-8">
        {stepIndex > 0 && (
          <button onClick={onBack} className="min-h-[48px] px-5 py-3 rounded-xl text-white/50 hover:text-white/80 hover:bg-white/5 text-sm font-semibold transition-colors focus-ring">
            ← Back
          </button>
        )}
        <button
          onClick={onNext}
          disabled={!canContinue}
          className="flex-1 min-h-[56px] py-4 rounded-xl font-black text-base transition-all duration-200 disabled:opacity-30 disabled:cursor-not-allowed hover:scale-[1.01] active:scale-[0.99] focus-ring"
          style={{ background: canContinue ? 'linear-gradient(135deg, #059669, #10B981)' : 'rgba(255,255,255,0.08)', color: '#fff', boxShadow: canContinue ? '0 10px 30px -12px rgba(16,185,129,0.5)' : 'none' }}
        >
          {stepIndex === totalSteps - 1 ? 'Review & pay →' : 'Continue →'}
        </button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   CHECKOUT STEP
   ══════════════════════════════════════ */
function CheckoutStep({ answers, onBack, onPay, paying }) {
  const [agreed, setAgreed] = useState(false);

  const nameQ  = FREELANCER.questions.find(q => q.id === 'name');
  const emailQ = FREELANCER.questions.find(q => q.id === 'email');
  const clientName  = answers[nameQ?.id]  || '';
  const clientEmail = answers[emailQ?.id] || '';

  return (
    <div className="step-enter">
      <h2 className="text-2xl sm:text-3xl font-black text-white mb-2" style={{ letterSpacing: '-0.02em' }}>
        One last step.
      </h2>
      <p className="text-white/40 text-sm mb-8 leading-relaxed">
        Secure your spot with a small qualification fee. It signals you're serious — and it's fully refundable if we're not a match.
      </p>

      {/* Summary card */}
      <div className="checkout-card rounded-2xl p-6 mb-6">
        <div className="flex items-start justify-between mb-4">
          <div>
            <p className="text-xs text-accent/70 uppercase tracking-widest font-mono mb-1">Consultation fee</p>
            <p className="text-white/70 text-sm">Initial intake with {FREELANCER.name}</p>
          </div>
          <div className="text-3xl font-black text-accent font-mono" style={{fontFamily: "'JetBrains Mono', monospace"}}>
            {FREELANCER.currency}{FREELANCER.price}
          </div>
        </div>

        <p className="text-xs text-white/30 leading-relaxed border-t border-white/5 pt-4">
          {FREELANCER.paymentRationale}
        </p>
      </div>

      {/* Refund note */}
      <div className="flex items-start gap-3 bg-white/[0.03] border border-white/[0.06] rounded-xl px-5 py-4 mb-6">
        <svg className="flex-shrink-0 mt-0.5 text-accent" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 1a7 7 0 100 14A7 7 0 008 1zm3.25 5.25L7 10.5 4.75 8.25l.5-.5L7 9.5l3.75-3.75.5.5z"/>
        </svg>
        <p className="text-xs text-white/40 leading-relaxed">{FREELANCER.refundPolicy}</p>
      </div>

      {/* Agree checkbox */}
      <label className="flex items-start gap-3 cursor-pointer mb-8 select-none">
        <input
          type="checkbox"
          checked={agreed}
          onChange={e => setAgreed(e.target.checked)}
          className="sr-only peer"
        />
        <div
          className="w-5 h-5 flex-shrink-0 rounded flex items-center justify-center mt-0.5 transition-all"
          style={{ background: agreed ? '#10B981' : 'rgba(255,255,255,0.06)', border: `1px solid ${agreed ? '#10B981' : 'rgba(255,255,255,0.15)'}` }}
        >
          {agreed && <svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5l3.5 3.5L11 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
        </div>
        <span className="text-xs text-white/45 leading-relaxed">
          I agree to the <a href="terms.html" target="_blank" className="text-accent/80 hover:text-accent underline">Terms of Service</a> and understand the refund policy.
        </span>
      </label>

      {/* Pay button */}
      <button
        onClick={() => agreed && !paying && onPay()}
        disabled={!agreed || paying}
        className="w-full py-5 rounded-xl font-black text-white text-lg transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed glow-accent"
        style={{ background: agreed ? 'linear-gradient(135deg, #059669, #10B981)' : 'rgba(255,255,255,0.08)' }}
      >
        {paying
          ? <span className="flex items-center justify-center gap-2">
              <svg className="animate-spin" width="18" height="18" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.2)" strokeWidth="3"/>
                <path d="M12 2a10 10 0 0110 10" stroke="white" strokeWidth="3" strokeLinecap="round"/>
              </svg>
              Redirecting to payment...
            </span>
          : `Pay ${FREELANCER.currency}${FREELANCER.price} & submit`
        }
      </button>

      {/* Stripe trust */}
      <div className="mt-5 flex flex-col items-center gap-3">
        <div className="stripe-badge rounded-lg px-4 py-2 flex items-center gap-2">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#10B981">
            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
          </svg>
          <span className="text-xs text-white/30 font-medium">Secured by Stripe · 256-bit SSL</span>
        </div>

        {/* Payment method logos */}
        <div className="flex items-center gap-2 flex-wrap justify-center" aria-label="Accepted payment methods">
          {/* Visa */}
          <div className="bg-white/[0.06] border border-white/[0.08] rounded-md px-2.5 py-1.5 flex items-center justify-center" style={{ minWidth: 44, height: 26 }} title="Visa">
            <svg width="30" height="10" viewBox="0 0 48 16" fill="none">
              <text x="0" y="13" fontFamily="Inter,sans-serif" fontSize="14" fontWeight="900" fill="#fff" fontStyle="italic" letterSpacing="-0.5">VISA</text>
            </svg>
          </div>
          {/* Mastercard */}
          <div className="bg-white/[0.06] border border-white/[0.08] rounded-md px-2.5 py-1.5 flex items-center justify-center" style={{ minWidth: 44, height: 26 }} title="Mastercard">
            <svg width="26" height="16" viewBox="0 0 32 20" fill="none">
              <circle cx="12" cy="10" r="7" fill="#EB001B"/>
              <circle cx="20" cy="10" r="7" fill="#F79E1B"/>
              <path d="M16 5.5a7 7 0 000 9 7 7 0 000-9z" fill="#FF5F00"/>
            </svg>
          </div>
          {/* Amex */}
          <div className="bg-white/[0.06] border border-white/[0.08] rounded-md px-2.5 py-1.5 flex items-center justify-center" style={{ minWidth: 44, height: 26 }} title="American Express">
            <svg width="30" height="10" viewBox="0 0 48 16" fill="none">
              <rect width="48" height="16" rx="2" fill="#2E77BC"/>
              <text x="24" y="12" textAnchor="middle" fontFamily="Inter,sans-serif" fontSize="9" fontWeight="900" fill="#fff" letterSpacing="0.3">AMEX</text>
            </svg>
          </div>
          {/* iDEAL */}
          <div className="bg-white/[0.06] border border-white/[0.08] rounded-md px-2.5 py-1.5 flex items-center justify-center" style={{ minWidth: 44, height: 26 }} title="iDEAL">
            <svg width="30" height="10" viewBox="0 0 48 16" fill="none">
              <text x="0" y="13" fontFamily="Inter,sans-serif" fontSize="12" fontWeight="900" fill="#CD0067" fontStyle="italic" letterSpacing="-0.3">i</text>
              <text x="7" y="13" fontFamily="Inter,sans-serif" fontSize="10" fontWeight="900" fill="#fff" letterSpacing="-0.2">DEAL</text>
            </svg>
          </div>
          {/* Apple Pay */}
          <div className="bg-white/[0.06] border border-white/[0.08] rounded-md px-2.5 py-1.5 flex items-center justify-center gap-1" style={{ minWidth: 44, height: 26 }} title="Apple Pay">
            <svg width="10" height="12" viewBox="0 0 14 17" fill="#fff">
              <path d="M11.5 8.9c0-2 1.6-3 1.7-3a3.6 3.6 0 00-2.8-1.5c-1.2-.1-2.3.7-2.9.7s-1.5-.7-2.5-.7A3.8 3.8 0 001.8 6.3c-1.4 2.4-.4 6 1 8 .7 1 1.5 2 2.6 2s1.4-.6 2.7-.6 1.6.6 2.7.6 1.9-1 2.5-2a8.7 8.7 0 001.2-2.4 3.6 3.6 0 01-1-3zM9.6 3.3A3.4 3.4 0 0010.5 1a3.7 3.7 0 00-2.4 1.2 3.2 3.2 0 00-.8 2.2 3 3 0 002.3-1.1z"/>
            </svg>
            <span className="text-[10px] font-semibold text-white">Pay</span>
          </div>
        </div>

        <p className="text-xs text-white/20">Your card info never touches our servers.</p>
      </div>

      {/* Back link */}
      <button onClick={onBack} className="w-full mt-6 text-center text-sm text-white/25 hover:text-white/50 transition-colors">
        ← Edit my answers
      </button>
    </div>
  );
}

/* ══════════════════════════════════════
   REVIEW ANSWERS (pre-checkout summary)
   ══════════════════════════════════════ */
function ReviewStep({ answers, onBack, onContinue }) {
  const displayQuestions = FREELANCER.questions.filter(q => answers[q.id]);
  return (
    <div className="step-enter">
      <h2 className="text-2xl sm:text-3xl font-black text-white mb-2" style={{ letterSpacing: '-0.02em' }}>
        Looks good?
      </h2>
      <p className="text-white/40 text-sm mb-8">Review your answers before we move to payment.</p>

      <div className="flex flex-col gap-3 mb-8">
        {displayQuestions.map(q => (
          <div key={q.id} className="bg-white/[0.03] border border-white/[0.06] rounded-xl px-5 py-4">
            <p className="text-xs text-white/30 mb-1">{q.label}</p>
            <p className="text-white/80 text-sm font-medium leading-snug">{answers[q.id]}</p>
          </div>
        ))}
      </div>

      <button
        onClick={onContinue}
        className="w-full py-5 rounded-xl font-black text-white text-lg glow-accent transition-all duration-200 hover:scale-[1.02] active:scale-[0.98]"
        style={{ background: 'linear-gradient(135deg, #059669, #10B981)' }}
      >
        Continue to payment →
      </button>

      <button onClick={onBack} className="w-full mt-5 text-center text-sm text-white/25 hover:text-white/50 transition-colors">
        ← Edit answers
      </button>
    </div>
  );
}

/* ══════════════════════════════════════
   MAIN APP
   ══════════════════════════════════════ */
function App() {
  const questions = FREELANCER.questions;
  const totalSteps = questions.length;

  // Stages: 'questions' | 'review' | 'checkout' | 'paying'
  const [stage, setStage] = useState('questions');
  const [stepIndex, setStepIndex] = useState(0);
  const [answers, setAnswers] = useState({});
  const [paying, setPaying] = useState(false);
  const containerRef = useRef(null);

  function scrollTop() {
    containerRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function handleAnswer(val) {
    setAnswers(prev => ({ ...prev, [questions[stepIndex].id]: val }));
  }

  function handleNext() {
    const q = questions[stepIndex];
    if (q.required && !answers[q.id]) return;
    scrollTop();
    if (stepIndex < totalSteps - 1) {
      setStepIndex(i => i + 1);
    } else {
      setStage('review');
    }
  }

  function handleBack() {
    scrollTop();
    if (stage === 'review') { setStage('questions'); setStepIndex(totalSteps - 1); return; }
    if (stage === 'checkout') { setStage('review'); return; }
    if (stepIndex > 0) setStepIndex(i => i - 1);
  }

  function handlePay() {
    setPaying(true);
    // In production: redirect to Stripe Checkout URL
    // For now: simulate redirect after 1.5s
    setTimeout(() => {
      window.location.href = 'intake-success.html';
    }, 1500);
  }

  const progress = stage === 'questions'
    ? (stepIndex / totalSteps) * 85
    : stage === 'review' ? 90
    : 100;

  return (
    <div className="min-h-screen bg-black text-white flex flex-col">
      {/* Ambient emerald glow */}
      <div className="fixed top-0 left-1/2 -translate-x-1/2 w-[900px] h-[500px] pointer-events-none opacity-60"
           style={{ background: 'radial-gradient(ellipse, rgba(16,185,129,0.08) 0%, transparent 70%)' }} />

      <div className="relative z-10 flex-1 w-full flex flex-col lg:flex-row lg:gap-10 xl:gap-16 max-w-6xl mx-auto px-5 sm:px-6 lg:px-10 pb-24 lg:py-12">

        {/* Left: trust panel (desktop only) */}
        <aside className="hidden lg:flex flex-col w-[340px] xl:w-[380px] flex-shrink-0 pt-10 lg:sticky lg:top-12 self-start max-h-[calc(100vh-6rem)]">
          <FreelancerHeader />
          <div className="mt-4 p-6 rounded-2xl border border-white/[0.08] bg-white/[0.02]">
            <p className="text-[11px] uppercase tracking-widest text-accent/70 font-mono mb-3">Why the fee?</p>
            <p className="text-white/60 text-sm leading-relaxed mb-5">
              {FREELANCER.paymentRationale}
            </p>
            <div className="flex items-start gap-3 pt-5 border-t border-white/[0.06]">
              <svg className="flex-shrink-0 mt-0.5 text-accent" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                <path d="M8 1a7 7 0 100 14A7 7 0 008 1zm3.25 5.25L7 10.5 4.75 8.25l.5-.5L7 9.5l3.75-3.75.5.5z"/>
              </svg>
              <p className="text-xs text-white/45 leading-relaxed">{FREELANCER.refundPolicy}</p>
            </div>
          </div>
          <div className="mt-4 flex items-center gap-3 text-xs text-white/30">
            <div className="flex items-center gap-1.5">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="#10B981"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
              <span>Secured by Stripe</span>
            </div>
            <span className="w-1 h-1 rounded-full bg-white/20" />
            <span>256-bit SSL</span>
          </div>
        </aside>

        {/* Right: the form */}
        <div className="flex-1 w-full max-w-xl lg:max-w-none mx-auto pt-10 lg:pt-10">
          {/* Mobile header */}
          <div className="lg:hidden">
            <FreelancerHeader />
          </div>

          <div ref={containerRef} className="relative mt-2">
            {/* Progress */}
            <div className="w-full h-0.5 bg-white/[0.06] rounded-full overflow-hidden mb-8 lg:mb-10">
              <div className="progress-fill h-full rounded-full bg-accent" style={{ width: `${progress}%`, boxShadow: '0 0 12px rgba(16,185,129,0.5)' }} />
            </div>

            {/* Stage: questions */}
            {stage === 'questions' && (
              <QuestionStep
                key={stepIndex}
                question={questions[stepIndex]}
                value={answers[questions[stepIndex].id]}
                onChange={handleAnswer}
                onNext={handleNext}
                onBack={handleBack}
                stepIndex={stepIndex}
                totalSteps={totalSteps}
              />
            )}

            {/* Stage: review */}
            {stage === 'review' && (
              <ReviewStep
                answers={answers}
                onBack={handleBack}
                onContinue={() => { scrollTop(); setStage('checkout'); }}
              />
            )}

            {/* Stage: checkout */}
            {stage === 'checkout' && (
              <CheckoutStep
                answers={answers}
                onBack={handleBack}
                onPay={handlePay}
                paying={paying}
              />
            )}
          </div>
        </div>
      </div>

      {/* Footer */}
      <footer className="w-full border-t border-white/5 py-8 px-6 text-center mt-auto">
        <p className="text-xs text-white/15">
          © 2026 DealGate · <a href="privacy.html" className="hover:text-white/30 transition-colors">Privacy</a> · <a href="terms.html" className="hover:text-white/30 transition-colors">Terms</a>
        </p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
