<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0B10" />
  <title>DealGate — Sign in</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2310B981'/%3E%3Cpath d='M10 16l4 4 8-8' stroke='%23062017' stroke-width='3.2' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E" />

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      background: #0A0B10;
      color: #E6E9F0;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      margin: 0;
      min-height: 100vh;
      line-height: 1.55;
    }
    ::selection { background: #10B981; color: #06241A; }

    .h-display { font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: -0.035em; line-height: 1.02; }
    .h-serif-italic { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; letter-spacing: -0.01em; }

    .text-gradient-brand {
      background: linear-gradient(180deg, #34D399, #10B981 60%, #059669);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    .aurora {
      background:
        radial-gradient(60% 45% at 50% 0%, rgba(16,185,129,0.14) 0%, rgba(16,185,129,0) 60%),
        radial-gradient(35% 35% at 15% 50%, rgba(52,211,153,0.06) 0%, rgba(52,211,153,0) 60%),
        radial-gradient(35% 35% at 85% 50%, rgba(5,150,105,0.06) 0%, rgba(5,150,105,0) 60%);
    }
    .dots {
      background-image: radial-gradient(rgba(255,255,255,0.055) 1px, transparent 1px);
      background-size: 24px 24px;
      mask-image: radial-gradient(ellipse 60% 60% at 50% 40%, #000 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse 60% 60% at 50% 40%, #000 30%, transparent 80%);
    }

    .dg-input {
      background: #0E1017;
      border: 1px solid #1E2230;
      color: #E6E9F0;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .dg-input::placeholder { color: #6B7387; }
    .dg-input:focus {
      border-color: rgba(16,185,129,0.55);
      background: #11141D;
      box-shadow: 0 0 0 4px rgba(16,185,129,0.1);
    }

    .btn-brand {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: linear-gradient(180deg, #1FD19B 0%, #10B981 100%);
      color: #06241A;
      font-weight: 600;
      font-size: 15px;
      border: none; cursor: pointer;
      border-radius: 12px;
      padding: 14px 22px;
      width: 100%;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.25) inset,
        0 0 0 1px rgba(16,185,129,0.35),
        0 10px 28px -10px rgba(16,185,129,0.6);
      transition: transform 0.15s ease, box-shadow 0.2s ease;
      font-family: 'Inter', sans-serif;
    }
    .btn-brand:hover {
      transform: translateY(-1px);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.3) inset,
        0 0 0 1px rgba(16,185,129,0.5),
        0 16px 36px -12px rgba(16,185,129,0.75);
    }
    .btn-brand:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

    .dg-error {
      color: #F87171;
      font-size: 13px;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.25);
      padding: 10px 14px;
      border-radius: 10px;
      text-align: left;
    }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-up { animation: fadeUp 0.65s cubic-bezier(0.22,1,0.36,1) forwards; opacity: 0; }

    button:focus-visible, a:focus-visible, input:focus-visible {
      outline: 2px solid rgba(16,185,129,0.6);
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    var SUPABASE_URL = 'https://pokgkdxuxwipoawviecs.supabase.co';
    var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBva2drZHh1eHdpcG9hd3ZpZWNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NTQyODQsImV4cCI6MjA5MjIzMDI4NH0.E-wkO-cUsG4yTKtjaCMiyNFOXEaoWnFvElod4-n9lwA';
    var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  </script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function LoginPage() {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [checking, setChecking] = useState(true);

      useEffect(() => {
        db.auth.getSession().then(({ data: { session } }) => {
          if (session) window.location.href = '/dashboard.html';
          else setChecking(false);
        });
      }, []);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!email || !password) return;
        setLoading(true);
        setError('');
        const { data, error: signInError } = await db.auth.signInWithPassword({ email, password });
        if (signInError) {
          setError(signInError.message === 'Invalid login credentials'
            ? 'Wrong email or password.'
            : signInError.message);
          setLoading(false);
          return;
        }
        window.location.href = '/dashboard.html';
      };

      if (checking) return null;

      return (
        <div className="relative min-h-screen flex flex-col overflow-hidden">
          <div className="absolute inset-0 aurora pointer-events-none" />
          <div className="absolute inset-0 dots pointer-events-none" />

          <header className="relative z-10 px-5 sm:px-6 py-5">
            <a href="/" className="inline-flex items-center gap-2.5 no-underline">
              <div className="w-8 h-8 rounded-lg grid place-items-center" style={{ background: 'linear-gradient(135deg,#34D399,#059669)' }}>
                <svg width="15" height="15" viewBox="0 0 14 14" fill="none"><path d="M2 7l3 3 7-7" stroke="#052619" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </div>
              <span className="font-semibold text-[15px] tracking-tight" style={{ color: '#E6E9F0' }}>DealGate</span>
            </a>
          </header>

          <main className="relative z-10 flex-1 flex items-center justify-center px-5 py-8">
            <div className="w-full max-w-sm animate-fade-up">
              <div className="text-center mb-8">
                <h1 className="h-display text-[40px] sm:text-[44px] text-white mb-3">
                  Welcome <span className="h-serif-italic text-gradient-brand">back</span>
                </h1>
                <p className="text-[14px]" style={{ color: '#8A93A6' }}>Sign in to your DealGate account</p>
              </div>

              <form onSubmit={handleSubmit} className="flex flex-col gap-4">
                <div>
                  <label className="block mb-1.5 text-[11px] font-semibold uppercase tracking-widest" style={{ color: '#6B7387' }}>Email</label>
                  <input className="dg-input" type="email" placeholder="you@example.com" value={email}
                    onChange={e => setEmail(e.target.value)} autoFocus required autoComplete="email" />
                </div>
                <div>
                  <label className="block mb-1.5 text-[11px] font-semibold uppercase tracking-widest" style={{ color: '#6B7387' }}>Password</label>
                  <input className="dg-input" type="password" placeholder="Your password" value={password}
                    onChange={e => setPassword(e.target.value)} required autoComplete="current-password" />
                </div>
                {error && <div className="dg-error">{error}</div>}
                <button type="submit" className="btn-brand mt-1" disabled={loading || !email || !password}>
                  {loading ? 'Signing in…' : 'Sign in'}
                  {!loading && <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M3 7h8m-3-3l3 3-3 3" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                </button>
              </form>

              <p className="text-center text-[13.5px] mt-6" style={{ color: '#6B7387' }}>
                No account yet?{' '}
                <a href="/onboarding.html" className="underline" style={{ color: '#34D399' }}>Get started free →</a>
              </p>
            </div>
          </main>

          <footer className="relative z-10 px-5 sm:px-6 py-6 text-[11px] text-center" style={{ color: '#6B7387' }}>
            © 2026 DealGate ·{' '}
            <a href="/privacy.html" className="hover:underline">Privacy</a>{' · '}
            <a href="/terms.html" className="hover:underline">Terms</a>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<LoginPage />);
  </script>
</body>
</html>
