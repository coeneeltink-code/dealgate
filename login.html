<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealGate — Sign In</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      margin: 0;
      min-height: 100vh;
    }
    .dg-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .dg-input::placeholder { color: rgba(255,255,255,0.3); }
    .dg-input:focus {
      border-color: rgba(255,59,59,0.5);
      background: rgba(255,255,255,0.06);
    }
    .btn-primary {
      background: #FF3B3B;
      color: #fff;
      font-weight: 800;
      font-size: 16px;
      border-radius: 10px;
      padding: 15px 28px;
      border: none;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s, transform 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .btn-primary:hover { background: #CC2E2E; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .dg-error { color: #FF3B3B; font-size: 13px; font-weight: 600; margin-top: 8px; text-align: center; }
    .grid-pattern {
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-up { animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) forwards; opacity: 0; }
    @keyframes pulseRed {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,59,59,0.5); }
      50%       { box-shadow: 0 0 0 14px rgba(255,59,59,0); }
    }
    .animate-pulse-red { animation: pulseRed 2.5s infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    var SUPABASE_URL = 'https://pokgkdxuxwipoawviecs.supabase.co';
    var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBva2drZHh1eHdpcG9hd3ZpZWNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NTQyODQsImV4cCI6MjA5MjIzMDI4NH0.E-wkO-cUsG4yTKtjaCMiyNFOXEaoWnFvElod4-n9lwA';
    var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  </script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function LoginPage() {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [checking, setChecking] = useState(true);

      // Check of al ingelogd
      useEffect(() => {
        db.auth.getSession().then(({ data: { session } }) => {
          if (session) window.location.href = '/dashboard.html';
          else setChecking(false);
        });
      }, []);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!email || !password) return;
        setLoading(true);
        setError('');

        const { data, error: signInError } = await db.auth.signInWithPassword({ email, password });

        if (signInError) {
          setError(signInError.message === 'Invalid login credentials'
            ? 'Wrong email or password.'
            : signInError.message);
          setLoading(false);
          return;
        }

        window.location.href = '/dashboard.html';
      };

      if (checking) return null;

      return (
        <div className="relative min-h-screen flex flex-col overflow-hidden">
          <div className="absolute inset-0 grid-pattern" style={{ opacity: 0.35, maskImage: 'radial-gradient(ellipse at center, black 40%, transparent 80%)', WebkitMaskImage: 'radial-gradient(ellipse at center, black 40%, transparent 80%)' }} />
          <div className="absolute pointer-events-none" style={{ top: '20%', left: '50%', transform: 'translateX(-50%)', width: '500px', height: '250px', background: 'rgba(255,59,59,0.1)', filter: 'blur(100px)' }} />

          <header className="relative z-10 flex items-center px-6 py-5">
            <a href="/" className="flex items-center gap-2 no-underline">
              <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ background: '#FF3B3B' }}>
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M3 3h10v10H3z" stroke="white" strokeWidth="1.8"/>
                  <path d="M7 6v4M9 6v4" stroke="white" strokeWidth="1.8" strokeLinecap="round"/>
                </svg>
              </div>
              <span className="text-white font-black text-xl tracking-tight">Deal<span style={{ color: '#FF3B3B' }}>Gate</span></span>
            </a>
          </header>

          <main className="relative z-10 flex-1 flex items-center justify-center px-4 py-8">
            <div className="w-full max-w-sm animate-fade-up">
              <div className="text-center mb-8">
                <h1 className="text-4xl font-black tracking-tight mb-3">Welcome back</h1>
                <p className="text-white/50 text-sm">Sign in to your DealGate account</p>
              </div>

              <form onSubmit={handleSubmit} className="flex flex-col gap-3">
                <div>
                  <label className="text-xs font-semibold text-white/40 uppercase tracking-widest block mb-1.5">Email</label>
                  <input
                    className="dg-input"
                    type="email"
                    placeholder="you@example.com"
                    value={email}
                    onChange={e => setEmail(e.target.value)}
                    autoFocus
                    required
                  />
                </div>
                <div>
                  <label className="text-xs font-semibold text-white/40 uppercase tracking-widest block mb-1.5">Password</label>
                  <input
                    className="dg-input"
                    type="password"
                    placeholder="Your password"
                    value={password}
                    onChange={e => setPassword(e.target.value)}
                    required
                  />
                </div>

                {error && <p className="dg-error">{error}</p>}

                <div className="mt-2">
                  <button
                    type="submit"
                    className="btn-primary animate-pulse-red"
                    disabled={loading || !email || !password}
                  >
                    {loading ? 'Signing in…' : 'Sign in →'}
                  </button>
                </div>
              </form>

              <p className="text-center text-white/30 text-sm mt-6">
                No account yet?{' '}
                <a href="/onboarding.html" style={{ color: '#FF3B3B', textDecoration: 'underline' }}>
                  Get started free →
                </a>
              </p>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<LoginPage />);
  </script>
</body>
</html>
