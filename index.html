<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    /* ════════ HELPERS ════════ */
    const useInView = (options = {}) => {
      const ref = useRef(null);
      const [inView, setInView] = useState(false);
      useEffect(() => {
        if (!ref.current) return;
        const obs = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) {
            setInView(true);
            obs.disconnect();
          }
        }, { threshold: 0.2, ...options });
        obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);
      return [ref, inView];
    };

    const Counter = ({ to, duration = 1800, suffix = '', prefix = '', decimals = 0 }) => {
      const [ref, inView] = useInView();
      const [val, setVal] = useState(0);
      useEffect(() => {
        if (!inView) return;
        let start = null;
        const step = (ts) => {
          if (!start) start = ts;
          const p = Math.min((ts - start) / duration, 1);
          const eased = 1 - Math.pow(1 - p, 3);
          setVal(to * eased);
          if (p < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      }, [inView, to, duration]);
      return <span ref={ref}>{prefix}{val.toFixed(decimals).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}{suffix}</span>;
    };

    const Reveal = ({ children, delay = 0, className = '' }) => {
      const [ref, inView] = useInView();
      return (
        <div
          ref={ref}
          className={`reveal ${inView ? 'visible' : ''} ${className}`}
          style={{ transitionDelay: `${delay}ms` }}
        >
          {children}
        </div>
      );
    };

    /* ════════ SCROLL PROGRESS ════════ */
    function ScrollProgress() {
      const [w, setW] = useState(0);
      useEffect(() => {
        const h = () => {
          const s = window.scrollY;
          const d = document.documentElement.scrollHeight - window.innerHeight;
          setW((s / d) * 100);
        };
        window.addEventListener('scroll', h, { passive: true });
        return () => window.removeEventListener('scroll', h);
      }, []);
      return (
        <div className="fixed top-0 left-0 right-0 h-0.5 z-[60]" style={{background: 'rgba(255,255,255,0.05)'}}>
          <div className="h-full bg-accent transition-[width] duration-75" style={{width: `${w}%`}} />
        </div>
      );
    }

    /* ════════ NAVBAR (with mobile menu) ════════ */
    function Navbar() {
      const [scrolled, setScrolled] = useState(false);
      const [open, setOpen] = useState(false);
      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 20);
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      const links = [
        { h: '#how-it-works', t: 'How it works' },
        { h: '#demo', t: 'Product' },
        { h: '#pricing', t: 'Pricing' },
        { h: '#faq', t: 'FAQ' },

      return (
        <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled || open ? 'bg-black/90 border-b border-white/5 backdrop-blur-xl' : 'bg-transparent'}`}>

                  <path d="M3 3h10v10H3z" stroke="white" strokeWidth="1.8"/>
                  <path d="M7 6v4M9 6v4" stroke="white" strokeWidth="1.8" strokeLinecap="round"/>
                </svg>
              </div>
              <span className="text-white font-black text-xl tracking-tight">
                Deal<span className="text-accent">Gate</span>
              </span>
            </a>
            <div className="hidden md:flex items-center gap-8 text-sm font-medium text-white/60">
              {links.map(l => (
                <a key={l.h} href={l.h} className="hover:text-white transition-colors">{l.t}</a>
              ))}
            </div>
            <div className="flex items-center gap-3">
              <a
                href="onboarding.html"
                className="hidden sm:inline-flex bg-accent hover:bg-accent-dark text-white text-sm font-black px-5 py-2.5 rounded-lg transition-all hover:scale-105 active:scale-95 glow-green"
              >
                Get paid before you talk →
              </a>
              {/* Hamburger — mobile only */}
              <button
                className="md:hidden w-10 h-10 flex items-center justify-center rounded-lg text-white/80 hover:bg-white/5 focus-ring"
                onClick={() => setOpen(o => !o)}
                aria-label={open ? 'Close menu' : 'Open menu'}
                aria-expanded={open}

                {open ? (
                  <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
                ) : (
                  <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 6h14M3 10h14M3 14h14" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>

                    key={l.h}
                    href={l.h}
                    onClick={() => setOpen(false)}

                    {l.t}

                  className="mt-2 bg-accent hover:bg-accent-dark text-white font-black px-4 py-3 rounded-lg text-center text-sm uppercase tracking-tight transition-colors"

                  Get paid before you talk →

              </div>
            </div>
          )}
        </nav>
      );
    }

    /* ════════ HERO ════════ */
    function Hero() {
      const [mouse, setMouse] = useState({ x: 0, y: 0 });
      const heroRef = useRef();
      useEffect(() => {
        const h = (e) => {
          if (!heroRef.current) return;
          const r = heroRef.current.getBoundingClientRect();
          setMouse({
            x: (e.clientX - r.left - r.width / 2) / r.width,
            y: (e.clientY - r.top - r.height / 2) / r.height,
          });
        };
        window.addEventListener('mousemove', h);
        return () => window.removeEventListener('mousemove', h);
      }, []);

      return (
        <section ref={heroRef} className="grain relative min-h-screen flex flex-col items-center justify-center text-center px-6 pt-28 pb-24 overflow-hidden">
          {/* Grid bg */}
          <div className="absolute inset-0 grid-pattern opacity-40" style={{maskImage: 'radial-gradient(ellipse at center, black 40%, transparent 80%)', WebkitMaskImage: 'radial-gradient(ellipse at center, black 40%, transparent 80%)'}} />

          {/* Ambient emerald glow blobs */}
          <div
            className="absolute rounded-full pointer-events-none"
            style={{
              top: '30%', left: '50%',
              transform: `translate(calc(-50% + ${mouse.x * 30}px), calc(-50% + ${mouse.y * 30}px))`,
              width: '800px', height: '400px',
              background: 'rgba(16,185,129,0.14)',
              filter: 'blur(140px)',
              transition: 'transform 0.4s cubic-bezier(0.22,1,0.36,1)',
            }}
          />
          <div
            className="absolute rounded-full pointer-events-none"
            style={{
              bottom: '10%', right: '10%',
              width: '400px', height: '400px',
              background: 'rgba(16,185,129,0.05)',
              filter: 'blur(120px)',
            }}
          />

          <div className="relative z-10 max-w-5xl mx-auto">
            {/* Eyebrow */}
            <div className="animate-fade-up inline-flex items-center gap-3 border border-accent/30 bg-accent/[0.08] backdrop-blur-sm text-white text-xs font-bold uppercase tracking-widest px-4 py-2 rounded-full mb-8">
              <span className="w-2 h-2 bg-accent rounded-full animate-pulse-dot" />
              <span className="text-accent">New</span>
              <span className="text-white/60">Trusted by 2,400+ freelancers</span>
            </div>

            {/* Headline */}
            <h1 className="hero-headline animate-fade-up text-[3.25rem] xs:text-6xl sm:text-7xl md:text-8xl lg:text-9xl xl:text-[10rem] font-black uppercase leading-[0.9] sm:leading-[0.85] tracking-tighter mb-8 sm:mb-10" style={{animationDelay: '100ms'}}>
              Stop Working<br />
              <span className="shimmer-text">For Free.</span>
            </h1>

            {/* Sub — money + pain */}
            <p className="animate-fade-up text-2xl md:text-3xl text-white font-bold max-w-3xl mx-auto leading-tight mb-5" style={{animationDelay: '200ms'}}>
              You're losing <span className="text-accent">€500+ per week</span> on bad clients.
            </p>
            <p className="animate-fade-up text-lg sm:text-xl text-white/60 max-w-2xl mx-auto mb-12 leading-relaxed" style={{animationDelay: '280ms'}}>
              DealGate makes clients <strong className="text-white">pay before they talk to you.</strong><br />
              No qualification = no call. No payment = no access.
            </p>

            {/* CTAs — outcome-driven */}
            <div className="animate-fade-up flex flex-col sm:flex-row gap-4 justify-center items-center mb-6" style={{animationDelay: '360ms'}}>
              <a
                href="#signup"
                className="group bg-accent text-white font-black text-xl sm:text-2xl px-12 py-5 rounded-xl w-full sm:w-auto animate-pulse-green transition-all hover:scale-105 active:scale-95 hover:bg-accent-dark uppercase tracking-tight"
              >
                Get paid before you talk
                <span className="inline-block ml-2 transition-transform group-hover:translate-x-1">→</span>
              </a>
              <a
                href="#how-it-works"
                className="text-white font-semibold text-base sm:text-lg px-8 py-4 rounded-xl border border-white/15 hover:border-white/30 hover:bg-white/5 transition-all w-full sm:w-auto"
              >
                See how it works
              </a>
            </div>

            {/* Friction removers */}
            <div className="animate-fade-up flex flex-wrap items-center justify-center gap-x-6 gap-y-2 text-sm text-white/50 mb-14" style={{animationDelay: '440ms'}}>
              <span className="flex items-center gap-1.5"><svg className="w-3 h-3 text-accent flex-shrink-0" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg> No credit card required</span>
              <span className="flex items-center gap-1.5"><svg className="w-3 h-3 text-accent flex-shrink-0" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg> Setup in 2 minutes</span>
              <span className="flex items-center gap-1.5"><svg className="w-3 h-3 text-accent flex-shrink-0" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg> Cancel anytime</span>

          {/* Scroll indicator */}

            <span className="uppercase tracking-widest">Scroll</span>
            <svg width="16" height="24" viewBox="0 0 16 24" fill="none">
              <rect x="1" y="1" width="14" height="22" rx="7" stroke="currentColor" strokeWidth="1.5"/>
              <circle cx="8" cy="8" r="2" fill="currentColor" style={{animation: 'scrollDot 2s ease-in-out infinite'}} />
            </svg>
          </div>
        </section>
      );
    }

    /* ════════ TRUST BAR ════════ */

        { value: '2,400+', label: 'freelancers screening smarter' },
        { value: '€1.2M+', label: 'in qualified fees collected' },
        { value: '9.1 hrs', label: 'saved per freelancer per week' },
        { value: '94%', label: 'of ghost clients filtered out' },
      ];
      return (

    /* ════════ LIVE NOTIFICATIONS ════════ */
    function LiveFeed() {
      const feed = [
        { name: 'David H.', action: 'just paid €1,250', time: '2m ago' },
        { name: 'Maria F.', action: 'qualified and paid €890', time: '5m ago' },
        { name: 'Alex K.', action: 'filtered 4 bad leads', time: '8m ago' },
        { name: 'Lena M.', action: 'just paid €2,100', time: '12m ago' },
        { name: 'Yuki T.', action: 'signed up for Pro', time: '15m ago' },
      ];
      const [idx, setIdx] = useState(0);
      const [visible, setVisible] = useState(false);
      const [raised, setRaised] = useState(false);

      useEffect(() => {
        const t = setTimeout(() => setVisible(true), 4000);
        const h = () => setRaised(window.scrollY > 1800);
        h();
        window.addEventListener('scroll', h, { passive: true });
        return () => { clearTimeout(t); window.removeEventListener('scroll', h); };
      }, []);

      useEffect(() => {
        if (!visible) return;
        const iv = setInterval(() => {
          setVisible(false);
          setTimeout(() => {
            setIdx(i => (i + 1) % feed.length);
            setVisible(true);
          }, 400);
        }, 6000);
        return () => clearInterval(iv);
      }, [visible, feed.length]);

      if (!visible) return null;
      const item = feed[idx];

      return (
        <div
          className="hidden sm:flex fixed left-6 z-40 bg-[#0a0a0a] border border-accent/30 rounded-xl px-4 py-3 items-center gap-3 max-w-xs transition-all duration-500"
          style={{bottom: raised ? '96px' : '24px', boxShadow: '0 20px 60px -15px rgba(16,185,129,0.3)', animation: 'slideInRight 0.5s cubic-bezier(0.22,1,0.36,1)'}}
        >
          <div className="w-9 h-9 rounded-full bg-accent/15 border border-accent/30 flex items-center justify-center flex-shrink-0">
            <span className="text-accent text-xs font-black">{item.name[0]}</span>

            <div className="text-white text-sm font-bold truncate">{item.name}</div>

          </div>
          <div className="text-white/25 text-[10px] text-mono flex-shrink-0">{item.time}</div>
        </div>
      );
    }
