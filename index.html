    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            serif: ['"Instrument Serif"', 'serif'],

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html {
      scroll-behavior: smooth;
      scroll-padding-top: 80px;
      -webkit-text-size-adjust: 100%;
    }
    body {
      background: #0A0B10;
      color: #E6E9F0;
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: "cv02","cv03","cv04","cv11";
      margin: 0;
      overflow-x: hidden;
      line-height: 1.55;
    }
    ::selection { background: #10B981; color: #06241A; }

    /* Typography */
    .h-display {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 0.98;
    }
    .h-serif-italic {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-weight: 400;
      letter-spacing: -0.01em;
    }
    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #10B981;
    }

    /* Gradients & effects */
    .text-gradient-brand {
      background: linear-gradient(180deg, #34D399 0%, #10B981 60%, #059669 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .text-gradient-fade {
      background: linear-gradient(180deg, #F7F9FC 0%, #E6E9F0 40%, #8A93A6 130%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* Reveal */
    .reveal {
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.7s cubic-bezier(0.22,1,0.36,1), transform 0.7s cubic-bezier(0.22,1,0.36,1);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* Hairline */
    .hairline { border: 1px solid #1E2230; }
    .hairline-t { border-top: 1px solid #1E2230; }
    .hairline-b { border-bottom: 1px solid #1E2230; }

    /* Noise + radial glow backgrounds */
    .noise::before {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/%3E%3C/svg%3E");
      opacity: 0.035;
      mix-blend-mode: overlay;
      pointer-events: none;
    }
    .aurora {
      background:
        radial-gradient(60% 45% at 50% 0%, rgba(16,185,129,0.14) 0%, rgba(16,185,129,0) 60%),
        radial-gradient(35% 35% at 15% 18%, rgba(52,211,153,0.08) 0%, rgba(52,211,153,0) 60%),
        radial-gradient(35% 35% at 85% 28%, rgba(5,150,105,0.08) 0%, rgba(5,150,105,0) 60%);
    }
    .aurora-soft {
      background:
        radial-gradient(50% 30% at 50% 50%, rgba(16,185,129,0.08) 0%, rgba(16,185,129,0) 70%);
    }
    .dots {
      background-image: radial-gradient(rgba(255,255,255,0.055) 1px, transparent 1px);
      background-size: 24px 24px;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, #000 40%, transparent 85%);
      -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, #000 40%, transparent 85%);
    }

    /* Buttons */
    .btn-brand {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: linear-gradient(180deg, #1FD19B 0%, #10B981 100%);
      color: #06241A;
      font-weight: 600;

        0 0 0 1px rgba(16,185,129,0.35),
        0 10px 28px -10px rgba(16,185,129,0.65);
      transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
    }
    .btn-brand:hover {
      transform: translateY(-1px);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.3) inset,
        0 0 0 1px rgba(16,185,129,0.5),
        0 16px 36px -12px rgba(16,185,129,0.75);
    }
    .btn-brand:active { transform: translateY(0); }

    .btn-ghost {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      color: #E6E9F0;
      background: rgba(255,255,255,0.02);
      border: 1px solid #1E2230;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;

    .btn-ghost:hover { background: rgba(255,255,255,0.04); border-color: #2A3040; }

    /* Card */
    .card {
      position: relative;
      background: linear-gradient(180deg, #12151E 0%, #0F131B 100%);
      border: 1px solid #1E2230;
      border-radius: 18px;
      transition: border-color 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;

    .card:hover {
      border-color: #2A3040;
      transform: translateY(-2px);
      box-shadow: 0 20px 40px -20px rgba(0,0,0,0.6);

    .card-featured {
      background:
        linear-gradient(180deg, rgba(16,185,129,0.08) 0%, rgba(16,185,129,0.02) 100%),
        linear-gradient(180deg, #12151E 0%, #0F131B 100%);
      border: 1px solid rgba(16,185,129,0.35);
      box-shadow: 0 0 0 1px rgba(16,185,129,0.05), 0 30px 60px -30px rgba(16,185,129,0.35);
    }

    /* Mac window */
    .mac {
      background: #0C0F16;
      border: 1px solid #1E2230;
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 60px 120px -40px rgba(0,0,0,0.75),
        0 0 0 1px rgba(255,255,255,0.02),
        0 0 0 6px rgba(16,185,129,0.04);
    }
    .mac-bar {
      display: flex; align-items: center; gap: 6px;
      padding: 11px 14px;
      background: #0A0C12;
      border-bottom: 1px solid #1E2230;
    }
    .mac-dot { width: 11px; height: 11px; border-radius: 9999px; }
    .mono { font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace; }

    /* FAQ */
    details summary::-webkit-details-marker { display: none; }
    details summary { list-style: none; }
    details[open] .faq-plus { transform: rotate(45deg); }
    details .faq-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
    details[open] .faq-body { max-height: 600px; }

    /* Marquee */
    @keyframes marquee {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    .marquee-track { animation: marquee 40s linear infinite; }

    /* Subtle pulse */
    @keyframes softPulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%     { opacity: 0.6; transform: scale(1.4); }
    }
    .dot-pulse { animation: softPulse 2s ease-in-out infinite; }

    /* Mobile nav */
    .mobile-nav {
      position: fixed; inset: 0;
      background: rgba(10,11,16,0.98);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 60;
      transform: translateY(-100%);
      transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);

    .mobile-nav.open { transform: translateY(0); }

    /* Utility */
    .divider-soft {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    }

    /* Focus states (a11y) */
    button:focus-visible, a:focus-visible, summary:focus-visible {
      outline: 2px solid rgba(16,185,129,0.6);
      outline-offset: 3px;
      border-radius: 6px;
    }
    details summary:focus-visible { outline-offset: 6px; }

    /* Image-safe on mobile */
    img { max-width: 100%; height: auto; display: block; }

    /* Hide scrollbar on marquee */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ═════════════ HELPERS ═════════════ */
    const useInView = (threshold = 0.12) => {
      const ref = useRef(null);
      const [inView, setInView] = useState(false);
      useEffect(() => {
        if (!ref.current) return;
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) { setInView(true); obs.disconnect(); }
        }, { threshold });
        obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);
      return [ref, inView];
    };
    const Reveal = ({ children, delay = 0, className = '' }) => {
      const [ref, inView] = useInView();
      return (
        <div ref={ref} className={`reveal ${inView ? 'visible' : ''} ${className}`} style={{ transitionDelay: `${delay}ms` }}>
          {children}
        </div>
      );
    };
    const Check = ({ size = 14, className = '' }) => (
      <svg className={`text-brand flex-shrink-0 ${className}`} width={size} height={size} viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M2 7.5l3 3 7-7" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    );
    const Star = ({ size = 14 }) => (
      <svg width={size} height={size} viewBox="0 0 14 14" fill="currentColor" aria-hidden="true">
        <path d="M7 0.5l1.9 4.3 4.6.4-3.5 3 1.1 4.5L7 10.4 2.9 12.7 4 8.2 0.5 5.2l4.6-.4L7 .5z"/>
      </svg>
    );

    /* ═════════════ NAV ═════════════ */
    function Nav() {
      const [scrolled, setScrolled] = useState(false);
      const [open, setOpen] = useState(false);
      useEffect(() => {
        const h = () => setScrolled(window.scrollY > 10);
        window.addEventListener('scroll', h, { passive: true });
        h();
        return () => window.removeEventListener('scroll', h);
      }, []);
      useEffect(() => {
        document.body.style.overflow = open ? 'hidden' : '';
        return () => { document.body.style.overflow = ''; };
      }, [open]);

      const links = [
        { href: '#how', label: 'How it works' },
        { href: '#product', label: 'Product' },
        { href: '#pricing', label: 'Pricing' },
        { href: '#faq', label: 'FAQ' },
      ];

      return (
        <>
          <header className={`fixed top-0 inset-x-0 z-50 transition-all duration-300 ${scrolled ? 'backdrop-blur-xl bg-bg/80 border-b border-line' : ''}`}>
            <div className="max-w-6xl mx-auto px-5 sm:px-6 h-16 flex items-center justify-between">
              <a href="/" className="flex items-center gap-2.5 group" aria-label="DealGate home">
                <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-2 to-brand-3 grid place-items-center shadow-lg shadow-brand/20">
                  <svg width="15" height="15" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M2 7l3 3 7-7" stroke="#052619" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
                <span className="font-semibold text-ink tracking-tight text-[15px]">DealGate</span>
              </a>

              <nav className="hidden md:flex items-center gap-8 text-[14px] text-muted">
                {links.map(l => (
                  <a key={l.href} href={l.href} className="hover:text-ink transition-colors">{l.label}</a>
                ))}
              </nav>

              <div className="hidden md:flex items-center gap-3">
                <a href="/login.html" className="text-[14px] text-muted hover:text-ink transition-colors">Sign in</a>
                <a href="/onboarding.html" className="btn-brand text-[13.5px] px-4 py-2 rounded-lg">
                  Claim your link
                </a>
              </div>

              <button
                className="md:hidden w-10 h-10 grid place-items-center rounded-lg border border-line hover:border-line-2 transition-colors"
                aria-label={open ? "Close menu" : "Open menu"}
                aria-expanded={open}
                onClick={() => setOpen(v => !v)}
              >
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
                  {open ? (
                    <path d="M3 3l12 12M15 3L3 15" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/>
                  ) : (
                    <><path d="M2 5h14" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/><path d="M2 13h14" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></>
                  )}
                </svg>
              </button>
            </div>
          </header>

          <div className={`mobile-nav ${open ? 'open' : ''} md:hidden`} aria-hidden={!open}>
            <div className="h-16 px-5 flex items-center justify-between border-b border-line">
              <a href="/" className="flex items-center gap-2.5" onClick={() => setOpen(false)}>
                <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-2 to-brand-3 grid place-items-center"><svg width="15" height="15" viewBox="0 0 14 14" fill="none"><path d="M2 7l3 3 7-7" stroke="#052619" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg></div>
                <span className="font-semibold text-ink tracking-tight">DealGate</span>
              </a>
              <button onClick={() => setOpen(false)} aria-label="Close menu" className="w-10 h-10 grid place-items-center rounded-lg border border-line">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 3l12 12M15 3L3 15" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>
              </button>
            </div>
            <div className="p-6 flex flex-col gap-1">
              {links.map(l => (
                <a key={l.href} href={l.href} onClick={() => setOpen(false)} className="text-ink text-xl font-medium py-3 border-b border-line/60">
                  {l.label}
                </a>
              ))}
              <a href="/login.html" className="text-muted text-lg py-3 mt-4">Sign in</a>
              <a href="/onboarding.html" className="btn-brand mt-4 py-4 rounded-xl text-base">
                Claim your link →
              </a>
            </div>
          </div>
        </>
      );
    }

    /* ═════════════ HERO ═════════════ */
    function Hero() {
      return (
        <section className="relative pt-28 sm:pt-32 pb-16 sm:pb-24 px-5 sm:px-6 overflow-hidden">
          <div className="absolute inset-0 aurora pointer-events-none" />
          <div className="absolute inset-x-0 top-0 h-[480px] dots pointer-events-none" />
          <div className="relative max-w-6xl mx-auto">
            <div className="grid lg:grid-cols-12 gap-10 lg:gap-14 items-center">
              <div className="lg:col-span-7 text-center lg:text-left">
                <Reveal>
                  <div className="inline-flex items-center gap-2 text-[11px] font-medium text-brand bg-brand/10 border border-brand/20 rounded-full pl-2 pr-3 py-1 mb-6">
                    <span className="relative w-2 h-2">
                      <span className="absolute inset-0 rounded-full bg-brand dot-pulse"></span>
                      <span className="absolute inset-0 rounded-full bg-brand"></span>
                    </span>
                    <span className="tracking-wider uppercase">Live · Built for US freelancers</span>
                  </div>
                </Reveal>
                <Reveal delay={80}>
                  <h1 className="h-display text-[44px] leading-[1.02] sm:text-[60px] md:text-[72px] lg:text-[78px] text-ink-2 mb-6">
                    Get paid <span className="h-serif-italic text-gradient-brand">before</span><br className="hidden sm:block" />
                    the first call.
                  </h1>
                </Reveal>
                <Reveal delay={160}>
                  <p className="text-[17px] sm:text-lg text-muted max-w-[560px] lg:max-w-[520px] mx-auto lg:mx-0 leading-relaxed mb-8">
                    Stop chasing tire-kickers. Clients prepay <span className="text-ink">$25–$100</span> to book you —
                    answer your qualifying questions first, credit card on the table. Keep 93–99%, pay out via Stripe.
                  </p>
                </Reveal>
                <Reveal delay={220}>
                  <div className="flex flex-col sm:flex-row items-center lg:items-start justify-center lg:justify-start gap-3 mb-8">
                    <a href="/onboarding.html" className="btn-brand px-6 py-3.5 rounded-xl text-[15px] w-full sm:w-auto">
                      Claim your link — it's free
                      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M3 7h8m-3-3l3 3-3 3" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    </a>
                    <a href="#product" className="btn-ghost px-6 py-3.5 rounded-xl text-[15px] w-full sm:w-auto">
                      See it in action

                  </div>
                </Reveal>
                <Reveal delay={280}>
                  <div className="flex items-center justify-center lg:justify-start gap-4">
                    <div className="flex -space-x-2">
                      {['SC','MT','PR','JK','AV'].map((i, k) => (
                        <div key={k} className="w-7 h-7 rounded-full ring-2 ring-bg grid place-items-center text-[10px] font-semibold text-ink-2"
                             style={{ background: `linear-gradient(135deg, hsl(${140 + k*28} 50% 45%), hsl(${160 + k*28} 50% 35%))` }}>{i}</div>
                      ))}
                    </div>
                    <div className="text-xs text-muted leading-tight">
                      <div className="flex items-center gap-1 text-brand mb-0.5"><Star size={10}/><Star size={10}/><Star size={10}/><Star size={10}/><Star size={10}/></div>
                      <span>Trusted by 200+ freelancers across NYC, SF, Austin</span>
                    </div>
                  </div>
                </Reveal>
              </div>

              <div className="lg:col-span-5">
                <Reveal delay={180}>
                  <HeroPreview />
                </Reveal>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function HeroPreview() {
      return (
        <div className="relative">
          <div className="absolute -inset-6 aurora-soft pointer-events-none blur-2xl" />
          <div className="relative mac">
            <div className="mac-bar">
              <div className="mac-dot bg-[#FF5F57]"></div>
              <div className="mac-dot bg-[#FEBC2E]"></div>
              <div className="mac-dot bg-[#28C840]"></div>
              <div className="ml-3 flex-1 text-center">
                <div className="mono text-[11px] text-muted inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-md bg-bg2 border border-line">
                  <svg width="9" height="9" viewBox="0 0 10 10" fill="none" aria-hidden="true"><path d="M3 4V3a2 2 0 014 0v1h1v4H2V4h1z" stroke="#10B981" strokeWidth="0.9"/></svg>
                  godealgate.com/sarahchen
                </div>
              </div>
            </div>
            <div className="p-5 sm:p-7">
              <div className="flex items-center gap-3 mb-5">
                <div className="w-11 h-11 rounded-full grid place-items-center text-white font-semibold text-sm"
                     style={{ background: 'linear-gradient(135deg,#34D399,#059669)' }}>SC</div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-1.5">
                    <div className="text-ink font-semibold text-[15px] truncate">Sarah Chen</div>
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><circle cx="7" cy="7" r="6" fill="#10B981"/><path d="M4 7l2 2 4-4" stroke="#052619" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  </div>
                  <div className="text-xs text-muted">Brand strategist · NYC</div>
                </div>
                <div className="text-[10px] text-muted uppercase tracking-wider">Verified</div>
              </div>

              <div className="relative rounded-xl p-4 mb-4 overflow-hidden hairline"
                   style={{ background: 'linear-gradient(180deg, rgba(16,185,129,0.08), rgba(16,185,129,0.02))' }}>
                <div className="flex items-start justify-between gap-4">
                  <div>
                    <div className="text-[10px] uppercase tracking-widest text-brand font-semibold mb-1">Intake fee</div>
                    <div className="flex items-baseline gap-1.5">
                      <span className="text-[32px] font-bold text-ink-2 tracking-tight leading-none">$50</span>
                      <span className="text-muted text-xs">USD</span>
                    </div>

                          <svg width="10" height="10" viewBox="0 0 12 12" fill="currentColor"><path d="M6 0l1.6 3.6 4 .4-3 2.6 1 4-3.6-2-3.6 2 1-4L.4 4l4-.4L6 0z"/></svg>
                          Most popular
                        </span>
                      </div>
                    )}
                    <div className="mb-1 text-ink font-semibold text-[15px]">{p.name}</div>
                    <div className="text-muted text-sm mb-6">{p.desc}</div>
                    <div className="flex items-baseline gap-1.5 mb-1">
                      <span className="h-display text-5xl text-ink-2">{p.price}</span>
                      {p.price !== 'Free' && <span className="text-muted text-sm">/month</span>}
                    </div>
                    <div className="text-brand text-xs font-semibold mb-7 tracking-wide uppercase">{p.fee} fee per booking</div>
                    <ul className="space-y-3 mb-8 flex-1">
                      {p.features.map((f, j) => (
                        <li key={j} className="flex items-start gap-2.5 text-ink/85 text-[14px]">
                          <span className="mt-0.5"><Check/></span>{f}
                        </li>
                      ))}
                    </ul>
                    <a href="/onboarding.html" className={`block text-center py-3 rounded-xl text-[14px] transition ${p.featured ? 'btn-brand' : 'btn-ghost'}`}>
                      {p.cta} →
                    </a>
                  </div>
                </Reveal>
              ))}
            </div>

            <Reveal delay={300}>
              <div className="mt-10 flex flex-wrap items-center justify-center gap-x-6 gap-y-3 text-xs text-muted">
                <span className="flex items-center gap-1.5"><Check size={12}/> No credit card required</span>
                <span className="flex items-center gap-1.5"><Check size={12}/> Cancel any time</span>
                <span className="flex items-center gap-1.5"><Check size={12}/> 30-day money-back on paid plans</span>
                <span className="flex items-center gap-1.5"><Check size={12}/> USD · Stripe-secured</span>
              </div>
            </Reveal>
          </div>
        </section>
      );
    }

    /* ═════════════ FAQ ═════════════ */
    function FAQ() {
      const items = [
        { q: "What if a client pays and I don't want to work with them?",
          a: "Reject the booking with one click. Stripe auto-refunds per your policy. You're never forced to take a project you don't want." },
        { q: "What if I pay and the freelancer never shows up?",
          a: "Every intake fee is held in Stripe. If the freelancer doesn't respond within their stated window (default: 48 hours), you get a full automatic refund." },
        { q: "How fast do I actually get paid out?",
          a: "Stripe payouts hit your bank in 2 business days by default — instant on request for an extra 1% Stripe fee. No manual invoicing, no chasing." },
        { q: "Do I need existing leads to use this?",
          a: "Yes. DealGate filters and converts the leads you already get. If you're not getting inbound, focus on that first — we're not a lead-gen tool." },
        { q: "Will clients actually pay an intake fee?",
          a: "Serious ones, yes. Tire-kickers won't. That's the entire point. Users report 94% of prepaid bookings convert to paid projects." },
        { q: "How is this different from Calendly or Stripe on its own?",
          a: "Calendly schedules. Stripe collects. Neither combines qualifying questions, a paywalled booking flow, anti-ghost refunds, and reject-with-one-click in a single link. We do." },
        { q: "Is it really free?",
          a: "Free plan is free forever — you only pay the 7% platform fee when you get paid. Pro and Scale are paid only if you want lower fees and extra features." },
        { q: "Can I cancel?",
          a: "One click, no questions. Free plan has no commitment; paid plans include a 30-day money-back guarantee." },
      ];
      return (
        <section id="faq" className="py-20 sm:py-28 px-5 sm:px-6 hairline-t">
          <div className="max-w-3xl mx-auto">
            <Reveal>
              <div className="text-center mb-12">
                <p className="eyebrow mb-4">FAQ</p>
                <h2 className="h-display text-[34px] sm:text-[44px] md:text-[52px] text-ink-2">
                  The <span className="h-serif-italic text-gradient-brand">real</span> questions.
                </h2>
              </div>
            </Reveal>
            <div className="space-y-3">
              {items.map((it, i) => (
                <Reveal key={i} delay={i * 55}>
                  <details className="card rounded-xl overflow-hidden">
                    <summary className="cursor-pointer p-5 sm:p-6 flex items-center justify-between gap-4">
                      <span className="text-ink font-medium text-[15px] sm:text-[16px]">{it.q}</span>
                      <span className="faq-plus w-7 h-7 rounded-full border border-line grid place-items-center text-muted text-sm transition-transform flex-shrink-0">+</span>
                    </summary>
                    <div className="faq-body">
                      <div className="px-5 sm:px-6 pb-5 sm:pb-6 text-muted text-[14px] leading-relaxed">{it.a}</div>
                    </div>
                  </details>
                </Reveal>
              ))}
            </div>
          </div>
        </section>
      );
    }

    /* ═════════════ FINAL CTA ═════════════ */
    function CTA() {
      return (
        <section className="py-24 sm:py-32 px-5 sm:px-6 relative overflow-hidden hairline-t">

            <Reveal>
              <h2 className="h-display text-[40px] sm:text-[56px] md:text-[64px] text-ink-2 mb-6 leading-[1.02]">
                Stop giving away<br className="hidden sm:block" />
                your <span className="h-serif-italic text-gradient-brand">time</span>.
              </h2>
            </Reveal>
            <Reveal delay={100}>
              <p className="text-muted text-[17px] mb-8 max-w-xl mx-auto leading-relaxed">

            <Reveal delay={180}>
              <div className="flex flex-col sm:flex-row items-center justify-center gap-3">

                  Claim your DealGate link
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M3 7h8m-3-3l3 3-3 3" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </a>
                <a href="/login.html" className="btn-ghost px-7 py-4 rounded-xl text-[15px] w-full sm:w-auto">Sign in</a>
              </div>
            </Reveal>
            <Reveal delay={240}>
              <p className="text-muted text-xs mt-6">
                Free forever on Starter · No card required · Setup in 10 min
              </p>
            </Reveal>
          </div>
        </section>
      );
    }

    /* ═════════════ FOOTER ═════════════ */
    function Footer() {
      const col = (heading, links) => (
        <div>
          <div className="eyebrow !text-muted mb-4">{heading}</div>
          <ul className="space-y-2.5 text-sm">
            {links.map((l, i) => (
              <li key={i}><a href={l.href} className="text-ink/70 hover:text-ink transition-colors">{l.label}</a></li>
            ))}
          </ul>
        </div>
      );
      return (
        <footer className="hairline-t">
          <div className="max-w-6xl mx-auto px-5 sm:px-6 py-14 sm:py-16 grid grid-cols-2 md:grid-cols-5 gap-10">
            <div className="col-span-2 md:col-span-2">
              <a href="/" className="flex items-center gap-2.5 mb-5">
                <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-2 to-brand-3 grid place-items-center">
                  <svg width="15" height="15" viewBox="0 0 14 14" fill="none"><path d="M2 7l3 3 7-7" stroke="#052619" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>

                </a>
                <a href="https://github.com/coeneeltink-code/dealgate" target="_blank" rel="noopener noreferrer" aria-label="GitHub" className="hover:text-ink transition-colors">
                  <svg width="17" height="17" viewBox="0 0 18 18" fill="currentColor" aria-hidden="true"><path d="M9 .5C4.3.5.5 4.3.5 9c0 3.76 2.43 6.95 5.81 8.08.42.08.57-.18.57-.41v-1.4c-2.36.51-2.86-1.14-2.86-1.14-.39-1-.95-1.26-.95-1.26-.77-.53.06-.52.06-.52.86.06 1.31.88 1.31.88.76 1.3 1.99.93 2.47.71.08-.55.3-.93.54-1.14-1.88-.21-3.86-.94-3.86-4.18 0-.93.33-1.68.87-2.28-.09-.21-.38-1.08.08-2.25 0 0 .71-.23 2.32.87.67-.19 1.39-.28 2.11-.28s1.44.09 2.11.28c1.61-1.1 2.32-.87 2.32-.87.46 1.17.17 2.04.08 2.25.54.6.87 1.35.87 2.28 0 3.25-1.98 3.97-3.87 4.18.31.27.58.79.58 1.6v2.37c0 .23.15.5.58.41A8.51 8.51 0 0017.5 9c0-4.7-3.8-8.5-8.5-8.5z"/></svg>
                </a>
              </div>
            </div>
            {col('Product',  [{ label: 'How it works', href: '#how' }, { label: 'Product',  href: '#product' }, { label: 'Pricing', href: '#pricing' }, { label: 'FAQ', href: '#faq' }])}
            {col('Account',  [{ label: 'Claim your link', href: '/onboarding.html' }, { label: 'Sign in', href: '/login.html' }])}
            {col('Legal',    [{ label: 'Privacy', href: '/privacy.html' }, { label: 'Terms', href: '/terms.html' }])}
          </div>
          <div className="hairline-t">
            <div className="max-w-6xl mx-auto px-5 sm:px-6 py-6 flex flex-col sm:flex-row items-center justify-between gap-3 text-xs text-muted">
              <span>© 2026 DealGate · Delaware, USA. All rights reserved.</span>
              <span className="flex items-center gap-2">
                <span className="w-1.5 h-1.5 rounded-full bg-brand dot-pulse"></span>
                Operational · Stripe-secured
              </span>
            </div>
          </div>
        </footer>
      );
    }

    /* ═════════════ APP ═════════════ */
    function App() {
      return (
        <>
          <Nav />
          <main>
            <Hero />
            <LogoStrip />

            <How />
            <Features />
            <Voices />
            <Pricing />

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
