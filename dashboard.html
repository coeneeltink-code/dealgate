<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealGate — Dashboard</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; }
    body {
      background: #0A0B10;
      color: #fff;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      margin: 0;
      min-height: 100vh;
    }
    .grid-pattern {
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .card {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 24px;
    }
    .link-box {
      font-family: 'JetBrains Mono', monospace;
      background: rgba(16,185,129,0.07);
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 14px;
      color: #10B981;
      word-break: break-all;
    }
    .btn-primary {
      background: #10B981;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      border-radius: 10px;
      padding: 12px 20px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .btn-primary:hover { background: #059669; transform: translateY(-1px); }
    .btn-ghost {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.7);
      font-weight: 600;
      font-size: 14px;
      border-radius: 10px;
      padding: 10px 18px;
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      transition: background 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .badge-live {
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.3);
      color: #10B981;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-up { animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) forwards; opacity: 0; }
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 20px;
      border-radius: 100px;
      z-index: 9999;
      white-space: nowrap;
    }
    @keyframes pulseRed {
      0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.5); }
      50%       { box-shadow: 0 0 0 8px rgba(16,185,129,0); }
    }
    .dot-live { width: 8px; height: 8px; border-radius: 50%; background: #10B981; animation: pulseRed 2s infinite; display: inline-block; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    var SUPABASE_URL = 'https://pokgkdxuxwipoawviecs.supabase.co';
    var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBva2drZHh1eHdpcG9hd3ZpZWNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NTQyODQsImV4cCI6MjA5MjIzMDI4NH0.E-wkO-cUsG4yTKtjaCMiyNFOXEaoWnFvElod4-n9lwA';
    var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  </script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function Dashboard() {
      const [freelancer, setFreelancer] = useState(null);
      const [loading, setLoading] = useState(true);
      const [toast, setToast] = useState('');

      useEffect(() => {
        const init = async () => {
          const { data: { session } } = await db.auth.getSession();
          if (!session) {
            window.location.href = '/login.html';
            return;
          }

          const { data } = await db
            .from('freelancers')
            .select('*')
            .eq('email', session.user.email)
            .maybeSingle();

          if (!data) {
            window.location.href = '/onboarding.html';
            return;
          }

          setFreelancer(data);
          setLoading(false);
        };
        init();
      }, []);

      const handleSignOut = async () => {
        await db.auth.signOut();
        window.location.href = '/login.html';
      };

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(''), 2500);
      };

      const copyLink = () => {
        const link = `https://godealgate.com/${freelancer.username}`;
        navigator.clipboard.writeText(link).catch(() => {});
        showToast('Link copied!');
      };

      const copyMessage = () => {
        const link = `https://godealgate.com/${freelancer.username}`;
        const msg = `Before we talk — fill this out so we don't waste each other's time: ${link}`;
        navigator.clipboard.writeText(msg).catch(() => {});
        showToast('Message copied — paste it to a lead!');
      };

      if (loading) return (
        <div className="flex items-center justify-center min-h-screen">
          <div style={{ color: 'rgba(255,255,255,0.3)', fontSize: 14 }}>Loading…</div>
        </div>
      );

      const link = `https://godealgate.com/${freelancer.username}`;

      return (
        <div className="relative min-h-screen">
          <div className="absolute inset-0 grid-pattern" style={{ opacity: 0.3, maskImage: 'radial-gradient(ellipse at center, black 50%, transparent 85%)', WebkitMaskImage: 'radial-gradient(ellipse at center, black 50%, transparent 85%)' }} />

          {/* Header */}
          <header className="relative z-10 flex items-center justify-between px-6 py-5 border-b" style={{ borderColor: 'rgba(255,255,255,0.06)' }}>
            <div className="flex items-center gap-2">
              <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ background: '#10B981' }}>
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M3 3h10v10H3z" stroke="white" strokeWidth="1.8"/>
                  <path d="M7 6v4M9 6v4" stroke="white" strokeWidth="1.8" strokeLinecap="round"/>
                </svg>
              </div>
              <span className="text-white font-black text-xl tracking-tight">Deal<span style={{ color: '#10B981' }}>Gate</span></span>
            </div>
            <div className="flex items-center gap-3">
              <span className="text-white/40 text-sm hidden sm:block">{freelancer.email}</span>
              <button className="btn-ghost" onClick={handleSignOut}>Sign out</button>
            </div>
          </header>

          <main className="relative z-10 max-w-2xl mx-auto px-4 py-10 animate-fade-up">

            {/* Welcome */}
            <div className="mb-8">
              <div className="badge badge-live mb-3">
                <span className="dot-live" />
                Live
              </div>
              <h1 className="text-3xl font-black tracking-tight">Your intake is live</h1>
              <p className="text-white/40 text-sm mt-1">Share your link — clients pay before they talk to you.</p>
            </div>

            {/* Link card */}
            <div className="card mb-4">
              <p className="text-xs font-semibold text-white/40 uppercase tracking-widest mb-3">Your DealGate link</p>
              <div className="link-box mb-4">{link}</div>
              <div className="flex gap-2">
                <button className="btn-primary" onClick={copyLink}>Copy link</button>
                <button className="btn-ghost" onClick={copyMessage}>Copy message</button>
                <button className="btn-ghost" onClick={() => window.open(`https://wa.me/?text=${encodeURIComponent('Before we talk — fill this out: ' + link)}`, '_blank')}>WhatsApp</button>
              </div>
            </div>

            {/* Settings card */}
            <div className="card mb-4">
              <p className="text-xs font-semibold text-white/40 uppercase tracking-widest mb-4">Your setup</p>
              <div className="flex items-center justify-between mb-3 pb-3" style={{ borderBottom: '1px solid rgba(255,255,255,0.06)' }}>
                <span className="text-white/60 text-sm">Intake fee</span>
                <span className="font-bold text-white">${freelancer.price}</span>
              </div>
              <div>
                <span className="text-white/60 text-sm block mb-2">Questions</span>
                <div className="flex flex-col gap-2">
                  {(freelancer.questions || []).map((q, i) => (
                    <div key={i} className="text-sm text-white/80 flex gap-2">
                      <span style={{ color: '#10B981', fontWeight: 700 }}>{i + 1}.</span>
                      {q}
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Coming soon */}
            <div className="card" style={{ opacity: 0.5 }}>
              <p className="text-xs font-semibold text-white/40 uppercase tracking-widest mb-2">Payments</p>
              <p className="text-white/40 text-sm">Client payments will appear here once Stripe is connected. Coming soon.</p>
            </div>

          </main>

          {toast && <div className="toast">✓ {toast}</div>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
  </script>
</body>
</html>
