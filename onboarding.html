<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealGate — Get started</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          colors: {
            accent: '#FF3B3B',
            'accent-dark': '#CC2E2E',
            'accent-bright': '#FF5C5C',
          },
        },
      },
    }
  </script>

  <style>
    * { box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      margin: 0;
      overflow-x: hidden;
      min-height: 100vh;
    }
    ::selection { background: #FF3B3B; color: #fff; }

    .bg-card { background: rgba(255,255,255,0.025); }
    .bg-card-hover { background: rgba(255,255,255,0.045); }
    .border-subtle { border: 1px solid rgba(255,255,255,0.08); }

    .grid-pattern {
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .gradient-border {
      position: relative;
      background: linear-gradient(#0a0a0a, #0a0a0a) padding-box,
                  linear-gradient(135deg, rgba(255,59,59,0.4), rgba(255,59,59,0.05) 40%, rgba(255,255,255,0.05)) border-box;
      border: 1px solid transparent;
    }

    .glow-red {
      box-shadow: 0 0 60px -10px rgba(255,59,59,0.5), 0 0 120px -20px rgba(255,59,59,0.3);
    }

    .glow-red-sm {
      box-shadow: 0 0 30px -5px rgba(255,59,59,0.4);
    }

    .grain::before {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
      opacity: 0.04; pointer-events: none; mix-blend-mode: overlay;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes pulseRed {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,59,59,0.5), 0 10px 40px -10px rgba(255,59,59,0.5); }
      50%       { box-shadow: 0 0 0 14px rgba(255,59,59,0), 0 10px 40px -10px rgba(255,59,59,0.3); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }
    @keyframes checkPop {
      0%   { transform: scale(0); opacity: 0; }
      60%  { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes progressFill {
      from { width: 0; }
    }

    .animate-fade-up   { animation: fadeUp  0.55s cubic-bezier(0.22,1,0.36,1) forwards; opacity: 0; }
    .animate-fade-in   { animation: fadeIn  0.4s ease-out forwards; opacity: 0; }
    .animate-scale-in  { animation: scaleIn 0.5s cubic-bezier(0.22,1,0.36,1) forwards; opacity: 0; }
    .animate-pulse-red { animation: pulseRed 2.5s infinite; }
    .animate-check-pop { animation: checkPop 0.4s cubic-bezier(0.22,1,0.36,1) forwards; }

    .shimmer-text {
      background: linear-gradient(90deg, #fff 0%, #fff 40%, #FF3B3B 50%, #fff 60%, #fff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shimmer 4s linear infinite;
    }

    /* Input styling */
    .dg-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .dg-input::placeholder { color: rgba(255,255,255,0.3); }
    .dg-input:focus {
      border-color: rgba(255,59,59,0.5);
      background: rgba(255,255,255,0.06);
    }

    /* Price option */
    .price-option {
      cursor: pointer;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.025);
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      user-select: none;
    }
    .price-option:hover {
      border-color: rgba(255,59,59,0.3);
      background: rgba(255,255,255,0.05);
    }
    .price-option.selected {
      border-color: #FF3B3B;
      background: rgba(255,59,59,0.08);
    }

    /* Primary button */
    .btn-primary {
      background: #FF3B3B;
      color: #fff;
      font-weight: 800;
      font-size: 16px;
      border-radius: 10px;
      padding: 15px 28px;
      border: none;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s, transform 0.15s;
      font-family: 'Inter', sans-serif;
      letter-spacing: -0.01em;
    }
    .btn-primary:hover { background: #CC2E2E; transform: translateY(-1px); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* Secondary button */
    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.8);
      font-weight: 600;
      font-size: 15px;
      border-radius: 10px;
      padding: 14px 28px;
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      width: 100%;
      transition: background 0.2s, color 0.2s, transform 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); color: #fff; transform: translateY(-1px); }
    .btn-secondary:active { transform: scale(0.98); }

    /* Step indicator dot */
    .step-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: background 0.3s, width 0.3s;
    }
    .step-dot.active {
      background: #FF3B3B;
      width: 20px;
      border-radius: 3px;
    }
    .step-dot.done { background: rgba(255,59,59,0.4); }

    /* Link display */
    .link-display {
      font-family: 'JetBrains Mono', monospace;
      background: rgba(255,59,59,0.07);
      border: 1px solid rgba(255,59,59,0.25);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 15px;
      color: #FF3B3B;
      letter-spacing: -0.01em;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 20px;
      border-radius: 100px;
      animation: fadeIn 0.3s ease-out forwards;
      z-index: 9999;
      white-space: nowrap;
    }

    /* Dashboard table */
    .dash-row {
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .dash-row:last-child { border-bottom: none; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

    /* Error message */
    .dg-error {
      color: #FF3B3B;
      font-size: 13px;
      font-weight: 600;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // Supabase client initialisatie
    var SUPABASE_URL = 'https://pokgkdxuxwipoawviecs.supabase.co';
    var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBva2drZHh1eHdpcG9hd3ZpZWNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NTQyODQsImV4cCI6MjA5MjIzMDI4NH0.E-wkO-cUsG4yTKtjaCMiyNFOXEaoWnFvElod4-n9lwA';
    var db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── Logo ── */
    function Logo() {
      return (
        <div className="flex items-center gap-2">
          <div className="w-8 h-8 rounded-lg bg-accent flex items-center justify-center glow-red-sm flex-shrink-0">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M3 3h10v10H3z" stroke="white" strokeWidth="1.8"/>
              <path d="M7 6v4M9 6v4" stroke="white" strokeWidth="1.8" strokeLinecap="round"/>
            </svg>
          </div>
          <span className="text-white font-black text-xl tracking-tight">
            Deal<span className="text-accent">Gate</span>
          </span>
        </div>
      );
    }

    /* ── Step dots ── */
    function StepDots({ current, total }) {
      return (
        <div className="flex items-center gap-1.5">
          {Array.from({ length: total }).map((_, i) => (
            <div
              key={i}
              className={`step-dot ${i === current ? 'active' : i < current ? 'done' : ''}`}
            />
          ))}
        </div>
      );
    }

    /* ── Shell ── */
    function Shell({ step, totalSteps, children, hideProgress }) {
      return (
        <div className="grain relative min-h-screen flex flex-col overflow-hidden">
          <div
            className="absolute inset-0 grid-pattern"
            style={{
              opacity: 0.35,
              maskImage: 'radial-gradient(ellipse at center, black 40%, transparent 80%)',
              WebkitMaskImage: 'radial-gradient(ellipse at center, black 40%, transparent 80%)',
            }}
          />
          <div
            className="absolute pointer-events-none"
            style={{
              top: '20%', left: '50%', transform: 'translateX(-50%)',
              width: '600px', height: '300px',
              background: 'rgba(255,59,59,0.1)',
              filter: 'blur(120px)',
            }}
          />
          <header className="relative z-10 flex items-center justify-between px-6 py-5">
            <Logo />
            {!hideProgress && typeof step === 'number' && (
              <StepDots current={step} total={totalSteps || 6} />
            )}
          </header>
          <main className="relative z-10 flex-1 flex items-center justify-center px-4 py-8">
            {children}
          </main>
        </div>
      );
    }

    /* ── Toast ── */
    function Toast({ message, onDone }) {
      useEffect(() => {
        const t = setTimeout(onDone, 2200);
        return () => clearTimeout(t);
      }, []);
      return <div className="toast">✓ {message}</div>;
    }

    /* ════════════════════════════
       STEP 1 — SIGNUP
    ════════════════════════════ */
    function StepSignup({ onNext, setUserData }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!email || !password) return;
        setLoading(true);
        setError('');

        const username = email.split('@')[0].toLowerCase().replace(/[^a-z0-9]/g, '');

        // Check of email al bestaat
        const { data: existing } = await db
          .from('freelancers')
          .select('email')
          .eq('email', email)
          .maybeSingle();

        if (existing) {
          setError('This email is already registered.');
          setLoading(false);
          return;
        }

        setUserData({ email, username });
        onNext();
      };

      return (
        <Shell step={0} totalSteps={5}>
          <div className="w-full max-w-sm animate-fade-up">
            <div className="text-center mb-6">
              <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-accent/30 bg-accent/10 text-[11px] font-black text-accent uppercase tracking-widest">
                <span className="w-1.5 h-1.5 rounded-full bg-accent animate-pulse-red inline-block" />
                Step 1 of 5 — 90 seconds to paid
              </div>
            </div>
            <h1 className="text-4xl font-black tracking-tight text-center mb-3 leading-tight">
              Create your first<br />
              <span className="text-accent">paid client flow</span>
            </h1>
            <p className="text-white/50 text-center text-sm mb-10">
              Get paid before your next call.
            </p>

            <form onSubmit={handleSubmit} className="flex flex-col gap-3">
              <div>
                <label className="text-xs font-semibold text-white/40 uppercase tracking-widest block mb-1.5">Email</label>
                <input
                  className="dg-input"
                  type="email"
                  placeholder="you@example.com"
                  value={email}
                  onChange={e => setEmail(e.target.value)}
                  autoFocus
                  required
                />
              </div>
              <div>
                <label className="text-xs font-semibold text-white/40 uppercase tracking-widest block mb-1.5">Password</label>
                <input
                  className="dg-input"
                  type="password"
                  placeholder="Min. 8 characters"
                  value={password}
                  onChange={e => setPassword(e.target.value)}
                  minLength={8}
                  required
                />
              </div>

              {error && <p className="dg-error">{error}</p>}

              <div className="mt-2">
                <button
                  type="submit"
                  className="btn-primary animate-pulse-red"
                  disabled={loading || !email || password.length < 8}
                >
                  {loading ? 'Creating account…' : 'Start getting paid →'}
                </button>
              </div>
            </form>
          </div>
        </Shell>
      );
    }

    /* ════════════════════════════
       STEP 2 — WELCOME
    ════════════════════════════ */
    function StepWelcome({ onNext, userData }) {
      return (
        <Shell step={1} totalSteps={5}>
          <div className="w-full max-w-sm text-center animate-scale-in">
            <div className="flex justify-center mb-8">
              <div
                className="w-20 h-20 rounded-2xl bg-accent flex items-center justify-center"
                style={{ boxShadow: '0 0 60px -8px rgba(255,59,59,0.7)' }}
              >
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                  <path d="M7 7h22v22H7z" stroke="white" strokeWidth="2.5"/>
                  <path d="M15 13v10M19 13v10" stroke="white" strokeWidth="2.5" strokeLinecap="round"/>
                  <circle cx="27" cy="9" r="4" fill="#FF3B3B" stroke="white" strokeWidth="2"/>
                </svg>
              </div>
            </div>

            <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-accent/30 bg-accent/10 text-[11px] font-black text-accent uppercase tracking-widest mb-6">
              Step 2 of 5
            </div>
            <h1 className="text-4xl font-black tracking-tight leading-tight mb-4">
              Every day without this<br />
              <span className="shimmer-text">is free work.</span>
            </h1>
            <p className="text-white/60 text-base mb-12">
              3 quick steps. Then your next lead pays upfront.
            </p>

            <button className="btn-primary" onClick={onNext}>
              Set it up now →
            </button>
          </div>
        </Shell>
      );
    }

    /* ════════════════════════════
       STEP 3 — SET PRICE
    ════════════════════════════ */
    function StepPrice({ onNext, setFlowData }) {
      const [selected, setSelected] = useState(null);
      const prices = [25, 50, 100];

      const handleContinue = () => {
        if (!selected) return;
        setFlowData(d => ({ ...d, price: selected }));
        onNext();
      };

      return (
        <Shell step={2} totalSteps={5}>
          <div className="w-full max-w-sm animate-fade-up">
            <div className="flex justify-center mb-6">
              <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-accent/30 bg-accent/10 text-[11px] font-black text-accent uppercase tracking-widest">
                Step 3 of 5
              </div>
            </div>
            <h1 className="text-3xl font-black tracking-tight leading-tight text-center mb-3">
              Set your price<br />
              <span className="text-accent">per call.</span>
            </h1>
            <p className="text-white/50 text-center text-sm mb-10">
              This is what leads pay before they reach you.
            </p>

            <div className="flex flex-col gap-3 mb-8">
              {prices.map(value => (
                <div
                  key={value}
                  className={`price-option flex items-center justify-center py-6 ${selected === value ? 'selected' : ''}`}
                  onClick={() => setSelected(value)}
                >
                  <span className="font-black text-3xl text-white">€{value}</span>
                </div>
              ))}
            </div>

            <button className="btn-primary" onClick={handleContinue} disabled={!selected}>
              Continue →
            </button>
          </div>
        </Shell>
      );
    }

    /* ════════════════════════════
       STEP 4 — ADD QUESTIONS
    ════════════════════════════ */
    function StepQuestions({ onNext, setFlowData }) {
      const defaults = [
        'What do you need help with?',
        'What is your budget?',
        'What is your timeline?',
      ];
      const [answers, setAnswers] = useState([...defaults]);

      const set = (i, v) => setAnswers(a => { const n = [...a]; n[i] = v; return n; });

      const handleContinue = () => {
        // Sla de echte antwoorden op, val terug op defaults als leeg
        const finalQuestions = answers.map((a, i) => a.trim() || defaults[i]);
        setFlowData(d => ({ ...d, questions: finalQuestions }));
        onNext();
      };

      return (
        <Shell step={3} totalSteps={5}>
          <div className="w-full max-w-sm animate-fade-up">
            <div className="flex justify-center mb-6">
              <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-accent/30 bg-accent/10 text-[11px] font-black text-accent uppercase tracking-widest">
                Step 4 of 5 — almost done
              </div>
            </div>
            <h1 className="text-3xl font-black tracking-tight leading-tight text-center mb-3">
              Filter out<br />
              <span className="text-accent">time-wasters.</span>
            </h1>
            <p className="text-white/50 text-center text-sm mb-10">
              Leads answer these before they pay.
            </p>

            <div className="flex flex-col gap-3 mb-8">
              {defaults.map((placeholder, i) => (
                <input
                  key={i}
                  className="dg-input"
                  type="text"
                  placeholder={placeholder}
                  value={answers[i] === defaults[i] ? '' : answers[i]}
                  onChange={e => set(i, e.target.value || defaults[i])}
                />
              ))}
            </div>

            <button className="btn-primary" onClick={handleContinue}>
              You're 1 step away from getting paid →
            </button>
          </div>
        </Shell>
      );
    }

    /* ════════════════════════════
       STEP 5 — SUCCESS / LIVE
    ════════════════════════════ */
    function StepSuccess({ onNext, userData, flowData, setToast }) {
      const link = `dealgate.ai/${userData?.username || 'yourname'}`;
      const fullLink = `https://${link}`;
      const shareMessage = `Before we talk — fill this out so we don't waste each other's time: ${fullLink}`;
      const [copied, setCopied] = useState(false);
      const [saving, setSaving] = useState(true);

      // Sla de freelancer op in de database zodra dit scherm verschijnt
      useEffect(() => {
        const saveFreelancer = async () => {
          if (!userData?.email || !userData?.username) {
            alert('Fout: geen gebruikersdata gevonden.');
            setSaving(false);
            return;
          }

          try {
            const { data, error } = await db
              .from('freelancers')
              .upsert({
                email: userData.email,
                username: userData.username,
                price: flowData.price || 50,
                questions: flowData.questions || ['What do you need help with?', 'What is your budget?', 'What is your timeline?'],
              }, { onConflict: 'email' })
              .select();

            if (error) {
              alert('Supabase fout: ' + error.message + '\n\nCode: ' + error.code);
              console.error('Supabase error:', error);
            } else {
              console.log('Opgeslagen:', data);
            }
          } catch (e) {
            alert('Netwerk/CORS fout: ' + e.message);
            console.error('Catch error:', e);
          }

          setSaving(false);
        };

        saveFreelancer();
      }, []);

      const handleCopy = () => {
        if (copied) { onNext(); return; }
        navigator.clipboard.writeText(shareMessage).catch(() => {});
        setCopied(true);
        setToast('Message copied — now paste it to a lead');
      };

      const handleWhatsApp = () => {
        window.open(`https://wa.me/?text=${encodeURIComponent(shareMessage)}`, '_blank');
      };

      return (
        <Shell step={4} totalSteps={5}>
          <div className="w-full max-w-sm animate-scale-in text-center">
            <div className="flex justify-center mb-8">
              <div
                className="w-24 h-24 rounded-full flex items-center justify-center"
                style={{
                  background: 'radial-gradient(circle, rgba(255,59,59,0.2) 0%, rgba(255,59,59,0.05) 70%)',
                  boxShadow: '0 0 80px -10px rgba(255,59,59,0.6)',
                  border: '1px solid rgba(255,59,59,0.3)',
                }}
              >
                {saving ? (
                  <div style={{ width: 20, height: 20, border: '2px solid #FF3B3B', borderTopColor: 'transparent', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }} />
                ) : (
                  <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                    <path
                      d="M10 20L16 27L30 13"
                      stroke="#FF3B3B"
                      strokeWidth="3"
                      strokeLinecap="round"
                      strokeLinejoin="round"
                      className="animate-check-pop"
                    />
                  </svg>
                )}
              </div>
            </div>

            <h1 className="text-4xl font-black tracking-tight leading-tight mb-3">
              Your payment gate<br />
              <span className="text-accent">is live.</span>
            </h1>
            <p className="text-white/60 text-base mb-8">
              Next step: send it to a lead and get paid.
            </p>

            <div className="link-display flex items-center justify-between mb-6">
              <span>{link}</span>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" className="opacity-50 flex-shrink-0 ml-2">
                <path d="M3 3h4v4H3zM7 7h4v4H7z" stroke="#FF3B3B" strokeWidth="1.4"/>
              </svg>
            </div>

            <button
              className="btn-primary animate-pulse-red mb-2"
              onClick={handleCopy}
              style={copied ? { background: '#1a7a3c', animation: 'none' } : {}}
            >
              {copied ? '✓ Copied — paste this to a lead now, then tap to continue →' : 'Copy & send to first lead →'}
            </button>
            <p className="text-center text-accent text-xs font-black uppercase tracking-widest mb-4">
              Do this now or nothing changes.
            </p>
            <button
              className="mb-3 w-full flex items-center justify-center gap-2 font-bold text-[15px] rounded-[10px] py-[14px] px-7 transition-all hover:brightness-110 active:scale-[0.98]"
              style={{ background: '#25D366', color: '#000' }}
              onClick={handleWhatsApp}
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.768.966-.941 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893A11.821 11.821 0 0020.464 3.488"/>
              </svg>
              Send to a lead on WhatsApp →
            </button>
            <button
              className="btn-secondary"
              onClick={() => window.open(fullLink, '_blank')}
            >
              Preview link ↗
            </button>
          </div>
        </Shell>
      );
    }

    /* ════════════════════════════
       STEP 6 — INSTRUCTIONS
    ════════════════════════════ */
    function StepInstruction({ onNext, userData, flowData }) {
      const link = `dealgate.ai/${userData?.username || 'yourname'}`;

      return (
        <Shell hideProgress>
          <div className="w-full max-w-sm animate-fade-up">
            <h1 className="text-4xl font-black tracking-tight leading-tight text-center mb-8">
              Do this<br />
              <span className="text-accent">right now:</span>
            </h1>

            <p className="text-white/80 text-lg text-center mb-8 leading-relaxed font-semibold">
              Send this link to your next lead.
            </p>

            <div className="link-display text-center mb-8">{link}</div>

            <div className="gradient-border rounded-2xl p-5 mb-8">
              <p className="text-base text-white leading-relaxed font-bold">
                If they're serious — they will pay.
              </p>
              <p className="text-base text-white/50 leading-relaxed mt-2">
                If they don't — they were never going to buy.
              </p>
            </div>

            <button className="btn-primary" onClick={onNext}>
              Done. Show me the money →
            </button>
          </div>
        </Shell>
      );
    }

    /* ════════════════════════════
       DASHBOARD
    ════════════════════════════ */
    function Dashboard({ userData, flowData }) {
      const link = `dealgate.ai/${userData?.username || 'yourname'}`;
      const fullLink = `https://${link}`;
      const shareMessage = `Before we talk — fill this out so we don't waste each other's time: ${fullLink}`;
      const leads = [];
      const paidLeads = leads.filter(l => l.status === 'paid');
      const totalEarned = paidLeads.reduce((sum, l) => sum + l.amount, 0);
      const [toast, setToast] = useState(null);

      const handleCopy = () => {
        navigator.clipboard.writeText(shareMessage).catch(() => {});
        setToast('Message copied — paste it to a lead');
      };

      const handleWhatsApp = () => {
        window.open(`https://wa.me/?text=${encodeURIComponent(shareMessage)}`, '_blank');
      };

      const isEmpty = leads.length === 0;

      return (
        <Shell hideProgress>
          {toast && <Toast message={toast} onDone={() => setToast(null)} />}
          <div className="w-full max-w-2xl animate-fade-up">

            <div className="flex items-center justify-between mb-6">
              <div>
                <h1 className="text-2xl font-black tracking-tight">Your DealGate</h1>
                <p className="text-white/40 text-sm mt-0.5">@{userData?.username}</p>
              </div>
              <button
                className="bg-accent hover:bg-accent-dark text-white text-sm font-black px-4 py-2.5 rounded-lg transition-all hover:scale-105 active:scale-95 glow-red-sm"
                onClick={handleCopy}
              >
                Copy link
              </button>
            </div>

            <div className="mb-6 flex items-start gap-3 px-5 py-4 rounded-xl border border-accent/25 bg-accent/[0.06]">
              <div className="text-xs font-black text-accent uppercase tracking-widest pt-0.5 flex-shrink-0">Goal</div>
              <div className="text-sm text-white font-semibold leading-snug">
                Get your first paid lead today.
                <span className="text-white/60 font-medium"> Send your link to 3 people.</span>
              </div>
            </div>

            {isEmpty && (
              <div
                className="gradient-border rounded-2xl p-6 mb-8 relative overflow-hidden"
                style={{ boxShadow: '0 0 60px -20px rgba(255,59,59,0.4)' }}
              >
                <div className="flex items-start gap-4">
                  <div className="w-10 h-10 rounded-full bg-accent/15 border border-accent/40 flex items-center justify-center flex-shrink-0 animate-pulse-red">
                    <span className="text-accent font-black text-lg">!</span>
                  </div>
                  <div className="flex-1">
                    <h2 className="text-xl font-black text-white mb-1">No payments yet.</h2>
                    <p className="text-white/60 text-sm mb-4">
                      Send your link now — every hour you wait is unpaid work.
                    </p>
                    <div className="flex gap-2 flex-wrap">
                      <button
                        className="bg-accent hover:bg-accent-dark text-white text-sm font-black px-4 py-2.5 rounded-lg transition-all hover:scale-105 active:scale-95 glow-red-sm"
                        onClick={handleCopy}
                      >
                        Copy & send now →
                      </button>
                      <button
                        className="flex items-center gap-2 text-sm font-bold rounded-lg px-4 py-2.5 transition-all hover:brightness-110 active:scale-95"
                        style={{ background: '#25D366', color: '#000' }}
                        onClick={handleWhatsApp}
                      >
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.768.966-.941 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893A11.821 11.821 0 0020.464 3.488"/>
                        </svg>
                        WhatsApp
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}

            <div className="grid grid-cols-3 gap-4 mb-8">
              {[
                { label: 'Earned',    value: `€${totalEarned}`,   sub: 'Total received' },
                { label: 'Leads',     value: leads.length,         sub: 'All time' },
                { label: 'Paid',      value: paidLeads.length,     sub: leads.length ? `${Math.round(paidLeads.length / leads.length * 100)}% conversion` : '—' },
              ].map(({ label, value, sub }) => (
                <div key={label} className="gradient-border rounded-xl p-4">
                  <div className="text-xs font-semibold text-white/40 uppercase tracking-widest mb-1">{label}</div>
                  <div className={`text-3xl font-black ${value === 0 || value === '€0' ? 'text-white/30' : 'text-white'}`}>{value}</div>
                  <div className="text-xs text-white/30 mt-1">{sub}</div>
                </div>
              ))}
            </div>

            <div className="gradient-border rounded-xl p-4 mb-6 flex items-center justify-between gap-4">
              <div className="min-w-0">
                <div className="text-xs font-semibold text-white/30 uppercase tracking-widest mb-1">Your DealGate link</div>
                <div className="font-mono text-accent text-sm truncate">{link}</div>
              </div>
              <button
                className="text-xs font-bold bg-accent/10 hover:bg-accent/20 text-accent border border-accent/30 px-4 py-2 rounded-lg transition-colors flex-shrink-0"
                onClick={handleCopy}
              >
                Copy
              </button>
            </div>

            <div className="gradient-border rounded-xl overflow-hidden">
              <div className="px-5 py-4 border-b border-white/5 flex items-center justify-between">
                <span className="text-sm font-bold text-white">Recent leads</span>
                <span className="text-xs text-white/30">{leads.length} total</span>
              </div>

              {isEmpty ? (
                <div className="px-5 py-12 text-center">
                  <div className="w-12 h-12 rounded-full bg-white/5 border-subtle mx-auto mb-4 flex items-center justify-center">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                      <path d="M9 4v5l3 2" stroke="rgba(255,255,255,0.3)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                      <circle cx="9" cy="9" r="7" stroke="rgba(255,255,255,0.3)" strokeWidth="2"/>
                    </svg>
                  </div>
                  <div className="text-sm font-bold text-white/70 mb-1">Waiting on your first lead</div>
                  <div className="text-xs text-white/40">Paid leads appear here in real-time.</div>
                </div>
              ) : (
                leads.map((lead, i) => (
                  <div key={i} className="dash-row px-5 py-4 flex items-center justify-between hover:bg-white/[0.02] transition-colors">
                    <div className="flex items-center gap-3">
                      <div className="w-8 h-8 rounded-full bg-white/5 border-subtle flex items-center justify-center text-xs font-bold text-white/60">
                        {lead.name[0]}
                      </div>
                      <div>
                        <div className="text-sm font-semibold text-white">{lead.name}</div>
                        <div className="text-xs text-white/30">{lead.time}</div>
                      </div>
                    </div>
                    <div className="flex items-center gap-4">
                      <span className="text-sm font-black text-white">€{lead.amount}</span>
                      <span
                        className={`text-xs font-bold px-2.5 py-1 rounded-full ${
                          lead.status === 'paid'
                            ? 'bg-green-500/10 text-green-400 border border-green-500/20'
                            : 'bg-white/5 text-white/40 border border-white/10'
                        }`}
                      >
                        {lead.status === 'paid' ? '✓ Paid' : 'Pending'}
                      </span>
                    </div>
                  </div>
                ))
              )}
            </div>

            <p className="text-center text-white/20 text-xs mt-8">
              DealGate — Serious clients pay first.
            </p>
          </div>
        </Shell>
      );
    }

    /* ════════════════════════════
       APP ROOT
    ════════════════════════════ */
    const STEPS = ['signup', 'welcome', 'price', 'questions', 'success', 'instruction', 'dashboard'];

    function App() {
      const [stepIndex, setStepIndex] = useState(0);
      const [userData, setUserData] = useState({});
      const [flowData, setFlowData] = useState({});
      const [toast, setToast] = useState(null);

      const next = useCallback(() => setStepIndex(i => Math.min(i + 1, STEPS.length - 1)), []);
      const step = STEPS[stepIndex];

      useEffect(() => { window.scrollTo({ top: 0 }); }, [stepIndex]);

      return (
        <>
          {toast && <Toast message={toast} onDone={() => setToast(null)} />}

          {step === 'signup' && (
            <StepSignup onNext={next} setUserData={setUserData} />
          )}
          {step === 'welcome' && (
            <StepWelcome onNext={next} userData={userData} />
          )}
          {step === 'price' && (
            <StepPrice onNext={next} setFlowData={setFlowData} />
          )}
          {step === 'questions' && (
            <StepQuestions onNext={next} setFlowData={setFlowData} />
          )}
          {step === 'success' && (
            <StepSuccess onNext={next} userData={userData} flowData={flowData} setToast={setToast} />
          )}
          {step === 'instruction' && (
            <StepInstruction onNext={next} userData={userData} flowData={flowData} />
          )}
          {step === 'dashboard' && (
            <Dashboard userData={userData} flowData={flowData} />
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</body>
</html>
