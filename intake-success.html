<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're in — DealGate</title>
  <meta name="robots" content="noindex, nofollow" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: '#10B981',
            'accent-dark': '#059669',
            'accent-bright': '#34D399',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
            serif: ['Instrument Serif', 'serif'],
          },
        }
      }
    }
  </script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

    /* Checkmark animation */
    @keyframes checkDraw {
      from { stroke-dashoffset: 60; opacity: 0; }
      to   { stroke-dashoffset: 0;  opacity: 1; }
    }
    @keyframes circleDraw {
      from { stroke-dashoffset: 160; opacity: 0; }
      to   { stroke-dashoffset: 0;   opacity: 1; }
    }
    @keyframes ringPop {
      0%   { transform: scale(0.7); opacity: 0; }
      60%  { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1);   opacity: 1; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(16,185,129,0.3), 0 0 80px rgba(16,185,129,0.1); }
      50%       { box-shadow: 0 0 60px rgba(16,185,129,0.5), 0 0 120px rgba(16,185,129,0.2); }
    }

    .check-ring { animation: ringPop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.1s both; }
    .check-circle { stroke-dasharray: 160; animation: circleDraw 0.5s ease 0.3s both; }
    .check-path   { stroke-dasharray: 60;  animation: checkDraw  0.35s ease 0.7s both; }

    .glow-pulse { animation: glow-pulse 3s ease-in-out infinite; }

    .fade-up-1 { animation: fadeUp 0.5s ease 0.9s both; }
    .fade-up-2 { animation: fadeUp 0.5s ease 1.1s both; }
    .fade-up-3 { animation: fadeUp 0.5s ease 1.3s both; }
    .fade-up-4 { animation: fadeUp 0.5s ease 1.5s both; }
    .fade-up-5 { animation: fadeUp 0.5s ease 1.7s both; }

    .step-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
    }
    .step-number {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.3);
      color: #10B981;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2310B981'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Inter,sans-serif' font-weight='900' font-size='18' fill='white'>D</text></svg>" />
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useEffect, useState } = React;

const FREELANCER_NAME = 'Alex van der Berg';
const FREELANCER_EMAIL = 'alex@alexvanderberg.com';
const RESPONSE_WITHIN = '24 hours';

const NEXT_STEPS = [
  {
    title: 'Check your inbox',
    desc: `A confirmation has been sent to your email. Keep it handy — it has a link to your intake summary.`,
  },
  {
    title: `${FREELANCER_NAME} reviews your answers`,
    desc: `They'll go through your project details before reaching out. No generic responses.`,
  },
  {
    title: 'Expect a reply within ' + RESPONSE_WITHIN,
    desc: `You'll get a direct message with proposed next steps — or a full refund if it's not a fit.`,
  },
];

function SuccessCheck() {
  return (
    <div className="check-ring mx-auto mb-10" style={{ width: 100, height: 100 }}>
      <svg width="100" height="100" viewBox="0 0 100 100" fill="none">
        {/* Outer glow ring */}
        <circle cx="50" cy="50" r="48" fill="rgba(16,185,129,0.08)" />
        {/* Circle stroke */}
        <circle
          cx="50" cy="50" r="44"
          stroke="#10B981" strokeWidth="2"
          className="check-circle"
          style={{ transformOrigin: 'center', transform: 'rotate(-90deg)' }}
        />
        {/* Inner fill */}
        <circle cx="50" cy="50" r="36" fill="rgba(16,185,129,0.12)" />
        {/* Checkmark */}
        <path
          d="M33 50l11 11 23-24"
          stroke="#10B981" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"
          className="check-path"
        />
      </svg>
    </div>
  );
}

function App() {
  return (
    <div className="min-h-screen bg-black text-white flex flex-col items-center justify-center px-6 py-16">

      {/* Ambient glow */}
      <div className="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[400px] rounded-full pointer-events-none"
           style={{ background: 'radial-gradient(ellipse, rgba(16,185,129,0.07) 0%, transparent 70%)' }} />

      <div className="relative z-10 w-full max-w-md text-center">

        {/* Animated check */}
        <SuccessCheck />

        {/* Heading */}
        <h1 className="fade-up-1 text-4xl sm:text-5xl font-black text-white mb-3" style={{ letterSpacing: '-0.03em' }}>
          You're in.
        </h1>
        <p className="fade-up-2 text-xl text-accent font-semibold mb-4" style={{ fontFamily: "'Instrument Serif', serif", fontStyle: 'italic' }}>
          Your spot is secured.
        </p>
        <p className="fade-up-2 text-white/40 text-base mb-12 leading-relaxed max-w-sm mx-auto">
          {FREELANCER_NAME} will review your application and get back to you within {RESPONSE_WITHIN}.
        </p>

        {/* What happens next */}
        <div className="fade-up-3 text-left mb-10">
          <p className="text-xs uppercase tracking-widest text-white/25 font-mono mb-5 text-center">What happens next</p>
          <div className="flex flex-col gap-3">
            {NEXT_STEPS.map((step, i) => (
              <div key={i} className="step-card rounded-xl px-5 py-4 flex items-start gap-4">
                <div className="step-number">{i + 1}</div>
                <div>
                  <p className="text-white/80 font-semibold text-sm mb-0.5">{step.title}</p>
                  <p className="text-white/35 text-xs leading-relaxed">{step.desc}</p>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Refund note */}
        <div className="fade-up-4 bg-white/[0.03] border border-white/[0.06] rounded-xl px-5 py-4 mb-8 flex items-start gap-3 text-left">
          <svg className="flex-shrink-0 mt-0.5 text-accent" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 1a7 7 0 100 14A7 7 0 008 1zm3.25 5.25L7 10.5 4.75 8.25l.5-.5L7 9.5l3.75-3.75.5.5z"/>
          </svg>
          <p className="text-xs text-white/35 leading-relaxed">
            If {FREELANCER_NAME} determines it's not a fit, you'll receive a <strong className="text-white/60">full refund</strong> within 24 hours — no questions asked.
          </p>
        </div>

        {/* Action buttons */}
        <div className="fade-up-4 flex flex-col sm:flex-row gap-3 mb-8">
          <a href={`mailto:${FREELANCER_EMAIL}`}
             className="flex-1 min-h-[48px] px-5 py-3 rounded-xl border border-white/10 hover:border-accent/40 hover:bg-accent/5 text-white/70 hover:text-accent text-sm font-semibold text-center transition-all flex items-center justify-center gap-2">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 4l6 5 6-5M2 4v8h12V4M2 4h12" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
            Email {FREELANCER_NAME.split(' ')[0]} directly
          </a>
          <a href="index.html"
             className="flex-1 min-h-[48px] px-5 py-3 rounded-xl text-white/50 hover:text-white/80 text-sm font-semibold text-center transition-colors flex items-center justify-center">
            Back to home
          </a>
        </div>

        {/* Share note */}
        <p className="fade-up-5 text-xs text-white/20 leading-relaxed">
          Powered by <span className="text-white/30 font-medium">DealGate</span> — serious clients only.
        </p>
      </div>

      {/* Footer */}
      <footer className="border-t border-white/5 py-8 px-6 text-center mt-16">
        <p className="text-xs text-white/15">
          © 2026 DealGate · <a href="privacy.html" className="hover:text-white/30 transition-colors">Privacy</a> · <a href="terms.html" className="hover:text-white/30 transition-colors">Terms</a>
        </p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
